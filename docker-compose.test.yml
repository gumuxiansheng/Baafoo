# =============================================================================
# Baafoo 集成测试环境
# 用法: docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit
# =============================================================================
version: "3.8"

networks:
  baafoo-test-net:
    driver: bridge

services:
  server:
    networks:
      - baafoo-test-net
    # 不暴露端口到宿主机
    ports: !override []
    environment:
      - BAAFOO_HTTP_PORT=8084
      - BAAFOO_DB_TYPE=h2
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # 集成测试运行器
  test-runner:
    image: curlimages/curl:latest
    networks:
      - baafoo-test-net
    depends_on:
      server:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "=== Baafoo 集成测试 ===" &&
        echo "[1/4] 测试容器内DNS解析..." &&
        nslookup server && echo "  ✓ DNS解析成功" || echo "  ✗ DNS解析失败" &&
        echo "[2/4] 测试通过服务名访问API..." &&
        curl -sf http://server:8084/api/health && echo "  ✓ 服务名访问成功" || echo "  ✗ 服务名访问失败" &&
        echo "[3/4] 测试localhost访问(应该失败)..." &&
        curl -sf http://localhost:8084/api/health && echo "  ✗ localhost不应该成功！" || echo "  ✓ localhost正确失败" &&
        echo "[4/4] 测试Mock协议端口..." &&
        curl -sf http://server:9000/ && echo "  ✓ HTTP Mock端口可达" || echo "  ✓ HTTP Mock端口无默认路由(正常)" &&
        echo "=== 测试完成 ==="
      '
