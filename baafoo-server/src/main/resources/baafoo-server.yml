# Baafoo Server Configuration
# Loaded by com.baafoo.core.config.ConfigLoader

# HTTP port for management API + Web console
httpPort: 8084

# Protocol-specific listen ports
protocolPorts:
  http: 9000
  tcp: 9001
  kafka: 9002
  pulsar: 9003
  jms: 9004

# Data storage directory
dataDir: "~/.baafoo/data"

# Rule storage directory
rulesDir: "~/.baafoo/data/rules"

# Recording storage directory
recordingsDir: "~/.baafoo/data/recordings"

# Maximum recording retention days
recordingRetentionDays: 7

# Maximum rules per page (pagination)
maxRulesPerPage: 100

# Whether to enable CORS for Web console
corsEnabled: true

# CORS allowed origins (empty = all)
corsOrigins: []

# Web console static file path
webConsolePath: ""

# Whether to enable request logging
requestLogging: true

# Agent heartbeat timeout in seconds
agentHeartbeatTimeoutSec: 60

# Maximum agents per environment
maxAgentsPerEnvironment: 50

# Unmatched request default behavior: passthrough (default) or 404
# - passthrough: forward to real downstream and log
# - 404: return 404 response and log (strict stub mode)
unmatchedDefault: passthrough

# Database configuration
# type: "h2" (embedded, default) or "postgresql" (external)
database:
  type: h2
  url: "jdbc:h2:mem:baafoo;DB_CLOSE_DELAY=-1"
  # For PostgreSQL, set url, username, password
  # url: jdbc:postgresql://localhost:5432/baafoo
  # username: postgres
  # password: postgres

# Authentication configuration (RBAC)
auth:
  # Whether to enable authentication. When disabled, all requests get admin role.
  enabled: false
  # Whether to auto-grant admin role for local requests (127.0.0.1 / ::1).
  # Default is false. Only enable in trusted, isolated environments.
  localBypass: false
  # Trusted proxy IPs allowed to set X-Forwarded-For. Only requests from these
  # IPs will have their X-Forwarded-For header honored during remote address
  # resolution. Empty list (default) means X-Forwarded-For is never trusted.
  # trustedProxies:
  #   - 127.0.0.1
  #   - 10.0.0.0/8
  # JWT signing secret (at least 32 characters). If not set, auto-generated key is used.
  # jwtSecret: "change-me-to-a-long-random-secret-string"
  # JWT token expiry in hours (default: 24, max: 168/7 days)
  tokenExpiryHours: 24
  # Static API Key to role mapping. Requests with X-Api-Key header matching a key below
  # will be authenticated with the corresponding role.
  # apiKeys:
  #   dev-key-001: developer
  #   test-key-001: tester
