# =============================================================================
# Baafoo 浼佷笟绾у簲鐢ㄦ祴璇?- Nacos 娉ㄥ唽閰嶇疆涓績
# 楠岃瘉 Agent 鍦?Nacos 鏈嶅姟娉ㄥ唽/鍙戠幇/閰嶇疆鍦烘櫙涓嬬殑鎷︽埅鑳藉姏
#
# 鐢ㄦ硶:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Nacos Server锛堢湡瀹炲疄渚嬶紝鐢ㄤ簬 passthrough 妯″紡瀵规瘮娴嬭瘯锛?  # =========================================================================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: baafoo-enterprise-nacos-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18848:8848"
      - "19848:9848"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - JVM_MS=32m
      - JVM_MMS=64m
      - JAVA_OPT=-XX:-UseContainerSupport
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # =========================================================================
  # 娴嬭瘯搴旂敤锛堟寕杞?Baafoo Agent锛屽悜 Nacos 娉ㄥ唽骞惰皟鐢?Nacos API锛?  # 澶嶇敤 baafoo-test-spring锛屽寘鍚?HTTP 璋冪敤鎺ュ彛
  # =========================================================================
  nacos-test-app:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/nacos/Dockerfile.nacos-test-app
    container_name: baafoo-enterprise-nacos-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18091:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-nacos
      - SERVER_PORT=9090
      - NACOS_ADDR=nacos:8848
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/api/stub-demo/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # 娴嬭瘯鍒濆鍖栧鍣?- 鍒涘缓娴嬭瘯鐜鍜岃鍒?  # =========================================================================
  nacos-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-nacos-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos-test-app:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Nacos 浼佷笟绾ф祴璇曠幆澧冨垵濮嬪寲"
        echo "============================================"
        echo ""

        echo "[1/4] 鍒涘缓 enterprise-nacos 鐜..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-nacos","mode":"stub","description":"Nacos浼佷笟绾ф祴璇曠幆澧?}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[2/4] 鍒涘缓 Nacos 娉ㄥ唽 API Mock 瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-register-mock","name":"Nacos娉ㄥ唽API Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance"}],"responses":[{"name":"Mock娉ㄥ唽鍝嶅簲","statusCode":200,"body":"{\"ok\":true,\"mocked\":true,\"source\":\"baafoo-nacos\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","register"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[3/4] 鍒涘缓 Nacos 鏈嶅姟鍙戠幇 API Mock 瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-discovery-mock","name":"Nacos鏈嶅姟鍙戠幇Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance/list"}],"responses":[{"name":"Mock鏈嶅姟鍒楄〃","statusCode":200,"body":"{\"name\":\"mock-service\",\"hosts\":[{\"instanceId\":\"mock-1\",\"ip\":\"192.168.1.100\",\"port\":8080,\"healthy\":true,\"enabled\":true}],\"mocked\":true}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","discovery"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[4/4] 鍒涘缓 Nacos 閰嶇疆鎷夊彇 API Mock 瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-config-mock","name":"Nacos閰嶇疆鎷夊彇Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/cs/configs"}],"responses":[{"name":"Mock閰嶇疆","statusCode":200,"body":"server.port=9999\nmock.config=true\nsource=baafoo-nacos","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","config"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "============================================"
        echo "  Nacos 浼佷笟绾ф祴璇曠幆澧冨氨缁?
        echo "============================================"
        echo ""
        echo "  Baafoo鎺у埗鍙? http://localhost:18084"
        echo "  娴嬭瘯搴旂敤:     http://localhost:18091"
        echo "  Nacos鎺у埗鍙?  http://localhost:18848/nacos"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  娴嬭瘯鎺ュ彛:"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/ns/instance/list?serviceName=test"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/cs/configs?dataId=test&group=DEFAULT"
        echo "    POST /api/http/post?url=http://nacos:8848/nacos/v1/ns/instance?serviceName=test&ip=10.0.0.1&port=8080"
        echo "============================================"
