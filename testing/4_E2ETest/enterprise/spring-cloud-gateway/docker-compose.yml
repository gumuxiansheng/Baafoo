# =============================================================================
# Baafoo Enterprise Test - Spring Cloud Gateway
# Verifies Agent intercepts Gateway routing traffic to backend service
#
# Usage:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Backend service - baafoo-test-spring with HTTP test endpoints
  # =========================================================================
  backend-service:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.backend
    container_name: baafoo-enterprise-gateway-backend
    networks:
      - baafoo-enterprise-net
    ports:
      - "18092:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway-backend
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Spring Cloud Gateway with Baafoo Agent
  # Routes /api/** to backend-service:9090
  # =========================================================================
  gateway:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.gateway
    container_name: baafoo-enterprise-gateway
    networks:
      - baafoo-enterprise-net
    ports:
      - "18080:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms128m -Xmx256m --add-opens java.base/java.net=ALL-UNNAMED
      - BACKEND_HOST=backend-service
      - BACKEND_PORT=9090
    depends_on:
      baafoo-server:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # Init container - create environments and register mock rules
  # =========================================================================
  gateway-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-gateway-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      gateway:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Spring Cloud Gateway test init"
        echo "============================================"
        echo ""

        echo "[1/5] Create environment enterprise-gateway..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway","mode":"stub","description":"Gateway enterprise test environment"}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[2/5] Create environment enterprise-gateway-backend..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway-backend","mode":"stub","description":"Gateway backend test environment"}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[3/5] Create Gateway route Mock rule for /api/mock/**..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"gateway-route-mock","name":"Gateway Route Mock","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/mock/"}],"responses":[{"name":"Mock Gateway Response","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-gateway\",\"path\":\"{{path}}\",\"timestamp\":\"{{now}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","route"],"environments":["enterprise-gateway"]}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[4/5] Create backend API Mock rule for /api/http/**..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"backend-api-mock","name":"Backend API Mock","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/http/"}],"responses":[{"name":"Mock Backend Response","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-backend\",\"method\":\"{{method}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","backend"],"environments":["enterprise-gateway-backend"]}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[5/5] Verify Gateway health..."
        curl -sf http://gateway:8080/actuator/health && echo "  OK" || echo "  FAILED"
        echo ""

        echo "============================================"
        echo "  Spring Cloud Gateway test init complete"
        echo "============================================"
        echo ""
        echo "  Baafoo Server:  http://localhost:18084"
        echo "  Gateway:        http://localhost:18080"
        echo "  Backend:        http://localhost:18092"
        echo "  API Key:        enterprise-admin-key"
        echo ""
        echo "  Test endpoints:"
        echo "    GET  /api/http/health          -> backend health check"
        echo "    GET  /api/http/get?url=...     -> backend HTTP proxy"
        echo "    GET  /api/mock/test            -> Gateway Agent Mock"
        echo "    GET  /api/backend/test         -> Backend service Mock"
        echo "============================================"
