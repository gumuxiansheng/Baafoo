name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# pull-requests: write lets the coverage step publish/update a PR comment.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: compile, run unit tests across all modules, and produce a single
  # aggregated JaCoCo report via the baafoo-coverage module (bound to verify).
  # ---------------------------------------------------------------------------
  backend:
    name: Build & Test (JDK 8)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # GitHub's ubuntu-latest runner ships a Docker daemon on
    # /var/run/docker.sock. Testcontainers (baafoo-testcontainers) and the
    # `docker build` step below use it directly — no dind service needed.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Full history lets the coverage tool compute changed-file coverage on PRs.
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      # baafoo-testcontainers spins up a real Baafoo server via Testcontainers,
      # which needs the local image "baafoo-server:latest". Build the server +
      # agent jars (skip tests here; the verify step below runs them) and bake
      # the image so the container test can start it.
      - name: Build server/agent jars
        run: ./mvnw -B --no-transfer-progress package -DskipTests -Dnpm.skip=true -pl baafoo-server,baafoo-agent -am

      - name: Build baafoo-server Docker image
        run: docker build -t baafoo-server:latest .

      # verify runs the full reactor's tests and triggers baafoo-coverage's
      # report-aggregate, writing baafoo-coverage/target/site/jacoco-aggregate.
      # -Dnpm.skip=true skips the frontend build here (handled by the web job).
      - name: Build and test with coverage
        run: ./mvnw -B --no-transfer-progress verify -Dnpm.skip=true

      - name: Add coverage to job summary & PR comment
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        continue-on-error: true
        with:
          paths: ${{ github.workspace }}/baafoo-coverage/target/site/jacoco-aggregate/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Coverage Report"
          update-comment: true
          # Report only; do not fail the build on low coverage. Raise these to
          # enforce a gate once a baseline is established.
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Upload aggregated coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: baafoo-coverage/target/site/jacoco-aggregate/
          if-no-files-found: warn

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: baafoo-jars
          path: |
            baafoo-server/target/baafoo-server-*.jar
            baafoo-agent/target/baafoo-agent-*.jar
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Frontend: install and build the Vue 3 console (web/).
  # ---------------------------------------------------------------------------
  frontend:
    name: Build Frontend (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload web dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Mutation testing (PIT): runs on baafoo-core (pure logic + strong unit
  # tests). Surfaces the mutation score so weak/"assertion-free" tests get
  # caught even when line coverage looks fine. Thresholds are 0, so this job
  # reports rather than gates the build. Runs as a parallel job so it does not
  # slow down the main build/test pipeline.
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: Mutation Testing (PIT)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Make run-mutation.sh executable
        run: chmod +x testing/1_UnitTest/run-mutation.sh

      - name: Run mutation testing (PIT) on baafoo-core
        # Delegate to the canonical mutation entry script; -Dnpm.skip=true keeps
        # the server's frontend build out of the core module's -am reactor.
        run: ./testing/1_UnitTest/run-mutation.sh --module baafoo-core --extra-args "-Dnpm.skip=true"

      - name: Upload PIT mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-mutation-report
          path: baafoo-core/target/pit-reports/
          if-no-files-found: warn
