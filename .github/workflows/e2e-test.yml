name: Enterprise E2E Test

on:
  workflow_dispatch:
    inputs:
      apps:
        description: '测试应用列表（逗号分隔，留空则全部）'
        required: false
        default: ''
      reason:
        description: '触发原因'
        required: false
        default: 'manual'
  schedule:
    # 每天北京时间 06:00 (UTC 22:00 前一天) 跑一次
    - cron: '0 22 * * *'

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: e2e-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      APPS_INPUT: ${{ github.event.inputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Make scripts executable
        run: |
          chmod +x mvnw
          find testing/4_E2ETest/enterprise -name 'smoke-test.sh' -exec chmod +x {} +
          chmod +x testing/4_E2ETest/enterprise/run-all-smoke-tests.sh 2>/dev/null || true

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Build JARs
        # 构建 baafoo-server、baafoo-agent、baafoo-test-spring 和企业级测试应用 JAR
        run: ./mvnw -B -q -DskipTests clean package

      - name: Set up JDK 17 for SCA
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build SCA test apps
        # SCA 是独立 Maven 项目（Java 17 + Spring Boot 3），不在主 reactor 中
        run: |
          cd testing/4_E2ETest/enterprise/spring-cloud-alibaba/baafoo-sca-test
          mvn -B -q -DskipTests clean package

      - name: Build Gateway test app
        # Gateway 是独立 Maven 项目（Java 17 + Spring Cloud Gateway），不在主 reactor 中
        run: |
          cd testing/4_E2ETest/enterprise/spring-cloud-gateway/baafoo-gateway-test
          mvn -B -q -DskipTests clean package

      - name: Determine app list
        id: app-list
        run: |
          if [ -z "${APPS_INPUT}" ]; then
            echo "apps=kafka,petclinic,spring-cloud-alibaba,nacos,spring-cloud-gateway" >> "$GITHUB_OUTPUT"
            echo "Selected apps: all (5 apps)"
          else
            echo "apps=${APPS_INPUT}" >> "$GITHUB_OUTPUT"
            echo "Selected apps: ${APPS_INPUT}"
          fi

      - name: Start enterprise environments
        # 逐个启动应用环境（docker compose up --build -d）
        run: |
          cd testing/4_E2ETest/enterprise
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.app-list.outputs.apps }}"
          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)  # trim whitespace
            echo "========================================"
            echo "  Starting: $app"
            echo "========================================"
            if [ -f "$app/docker-compose.yml" ]; then
              docker compose -f common/docker-compose.base.yml -f "$app/docker-compose.yml" up --build -d || {
                echo "  [FAIL] Failed to start $app"
                continue
              }
              echo "  [OK] $app started"
            else
              echo "  [SKIP] $app: docker-compose.yml not found"
            fi
          done

      - name: Wait for services to be healthy
        # 等待 Baafoo Server 和所有应用容器健康
        run: |
          echo "Waiting for Baafoo Server to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:18084/__baafoo__/api/status >/dev/null 2>&1; do sleep 2; echo "  ...waiting"; done'
          echo "  [OK] Baafoo Server is up"

          # Wait for each app's health endpoint
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.app-list.outputs.apps }}"
          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)
            case "$app" in
              kafka)
                echo "Waiting for kafka test app..."
                timeout 120 bash -c 'until curl -sf http://localhost:18090/api/stub-demo/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] kafka app up" || echo "  [WARN] kafka app not ready"
                ;;
              petclinic)
                echo "Waiting for petclinic app..."
                timeout 240 bash -c 'until curl -sf http://localhost:19966/vets >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] petclinic app up" || echo "  [WARN] petclinic app not ready"
                ;;
              spring-cloud-alibaba)
                echo "Waiting for SCA provider..."
                timeout 180 bash -c 'until curl -sf http://localhost:18081/actuator/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] SCA provider up" || echo "  [WARN] SCA provider not ready"
                echo "Waiting for SCA consumer..."
                timeout 180 bash -c 'until curl -sf http://localhost:18083/actuator/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] SCA consumer up" || echo "  [WARN] SCA consumer not ready"
                ;;
              nacos)
                echo "Waiting for Nacos server..."
                timeout 180 bash -c 'until curl -sf http://localhost:18848/nacos/v1/console/health/readiness >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] Nacos up" || echo "  [WARN] Nacos not ready"
                echo "Waiting for nacos test app..."
                timeout 120 bash -c 'until curl -sf http://localhost:18091/api/stub-demo/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] nacos test app up" || echo "  [WARN] nacos test app not ready"
                ;;
              spring-cloud-gateway)
                echo "Waiting for gateway..."
                timeout 180 bash -c 'until curl -sf http://localhost:18080/actuator/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] gateway up" || echo "  [WARN] gateway not ready"
                echo "Waiting for gateway backend..."
                timeout 120 bash -c 'until curl -sf http://localhost:18092/api/stub-demo/health >/dev/null 2>&1; do sleep 3; done' && echo "  [OK] gateway backend up" || echo "  [WARN] gateway backend not ready"
                ;;
            esac
          done

      - name: Diagnose init containers and API state
        # Show init container logs and verify environments/rules were created
        run: |
          echo "========== Server Logs (last 80 lines) =========="
          docker logs --tail 80 baafoo-enterprise-server 2>&1 || echo "(server container not found)"
          echo ""

          echo "========== Init Container Logs =========="
          for c in kafka petclinic sca nacos gateway; do
            name="baafoo-enterprise-${c}-init"
            echo "--- ${name} ---"
            docker logs "${name}" 2>&1 || echo "(container not found)"
            echo ""
          done

          echo "========== API State =========="
          echo "--- Environments ---"
          curl -sf -H "X-Api-Key: enterprise-admin-key" http://localhost:18084/__baafoo__/api/environments | jq . 2>/dev/null || echo "FAILED to list environments"
          echo ""
          echo "--- Rules ---"
          curl -sf -H "X-Api-Key: enterprise-admin-key" http://localhost:18084/__baafoo__/api/rules | jq '.data | length' 2>/dev/null || echo "FAILED to list rules"
          echo ""
          echo "--- Agents ---"
          curl -sf -H "X-Api-Key: enterprise-admin-key" http://localhost:18084/__baafoo__/api/agents | jq . 2>/dev/null || echo "FAILED to list agents"
          echo ""

          echo "========== Manual Environment Creation Test =========="
          echo "Testing POST /environments with enterprise-diagnostic..."
          resp=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST http://localhost:18084/__baafoo__/api/environments \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: enterprise-admin-key" \
            -d '{"name":"enterprise-diagnostic","mode":"stub","description":"diagnostic test"}')
          echo "Response: $resp"
          echo ""

      - name: Run smoke tests
        id: run-tests
        continue-on-error: true
        run: |
          cd testing/4_E2ETest/enterprise
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.app-list.outputs.apps }}"
          TOTAL_PASS=0
          TOTAL_FAIL=0
          TOTAL_SKIP=0
          ANY_FAILURE=0

          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)
            echo "========================================"
            echo "  Running smoke test: $app"
            echo "========================================"
            if [ -f "$app/smoke-test.sh" ]; then
              bash "$app/smoke-test.sh" || {
                exit_code=$?
                if [ "$exit_code" = "1" ]; then
                  ANY_FAILURE=1
                  echo "  [FAIL] $app smoke test had failures"
                elif [ "$exit_code" = "2" ]; then
                  echo "  [OK] $app smoke test passed with skips"
                fi
              }
              echo ""
            else
              echo "  [SKIP] $app: smoke-test.sh not found"
              echo ""
            fi
          done

          # Aggregate JUnit XML from all apps
          echo "Aggregating JUnit XML reports..."
          AGG_FILE="junit-report.xml"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$AGG_FILE"
          echo '<testsuites name="baafoo-enterprise-e2e">' >> "$AGG_FILE"

          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)
            if [ -f "$app/junit-report.xml" ]; then
              # Extract testsuite elements and inject into aggregate
              sed -n '/<testsuite/,/<\/testsuite>/p' "$app/junit-report.xml" >> "$AGG_FILE"
            fi
          done

          echo '</testsuites>' >> "$AGG_FILE"
          echo "  [OK] Aggregate report: $AGG_FILE"

          if [ "$ANY_FAILURE" = "1" ]; then
            exit 1
          fi
          exit 0

      - name: Fail on test failures
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "Step outcome: ${{ steps.run-tests.outcome }}"
          # Check aggregate JUnit XML for actual failures
          if [ -f testing/4_E2ETest/enterprise/junit-report.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' testing/4_E2ETest/enterprise/junit-report.xml | head -1 | grep -o '[0-9]*')
            echo "JUnit failures count: $FAILURES"
            if [ "$FAILURES" = "0" ]; then
              echo "No failures in JUnit XML — passing."
              exit 0
            fi
          fi
          echo "Real test failures detected. Failing the workflow."
          exit 1

      - name: Upload JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-report
          path: testing/4_E2ETest/enterprise/junit-report.xml
          if-no-files-found: warn

      - name: Upload per-app JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-per-app-reports
          path: testing/4_E2ETest/enterprise/*/junit-report.xml
          if-no-files-found: warn

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Enterprise E2E Test Report
          path: testing/4_E2ETest/enterprise/junit-report.xml
          reporter: java-junit

      - name: Tear down environments
        if: always()
        run: |
          cd testing/4_E2ETest/enterprise
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.app-list.outputs.apps }}"
          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)
            if [ -f "$app/docker-compose.yml" ]; then
              echo "Tearing down: $app"
              docker compose -f common/docker-compose.base.yml -f "$app/docker-compose.yml" down -v 2>/dev/null || true
            fi
          done
          echo "  [OK] All environments torn down"

      - name: Summary
        if: always()
        run: |
          echo "## Enterprise E2E Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.app-list.outputs.apps }}"
          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)
            if [ -f "$app/junit-report.xml" ]; then
              tests=$(grep -o 'tests="[0-9]*"' "$app/junit-report.xml" | head -1 | grep -o '[0-9]*')
              failures=$(grep -o 'failures="[0-9]*"' "$app/junit-report.xml" | head -1 | grep -o '[0-9]*')
              skipped=$(grep -o 'skipped="[0-9]*"' "$app/junit-report.xml" | head -1 | grep -o '[0-9]*')
              if [ "$failures" = "0" ]; then
                echo "| $app | ✅ ${tests} tests, ${skipped} skipped |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "| $app | ❌ ${tests} tests, ${failures} failed, ${skipped} skipped |" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "| $app | ⚠️ No report |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
