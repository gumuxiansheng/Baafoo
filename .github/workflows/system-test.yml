name: Full-Chain Integration Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Needed by dorny/test-reporter to publish a check run on the PR.
permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: system-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  system-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Make build scripts executable
        run: chmod +x mvnw testing/3_SystemTest/test-fullchain.sh testing/2_IntegrationTest/run-fullchain-tests.sh

      # Ensure jq is present. The test script degrades gracefully to python3
      # fallbacks when jq is missing, but having jq available keeps the RU01
      # rule-undo payload builder on its primary (jq) path and matches the
      # documented CI dependency. ubuntu-latest ships jq; this step is
      # idempotent insurance for other runners / minimal images.
      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Run full-chain integration test
        # The script builds all JARs, brings up the Staging stack (server +
        # postgres + app-env-a + app-env-b), registers rules, drives every
        # protocol/mode, writes testing/3_SystemTest/junit-report.xml, then
        # tears the stack down. No external network is touched — the only
        # "real backend" is the in-Staging echo endpoint (host: real-backend).
        #
        # Exit codes: 0 = all pass, 1 = failures, 2 = pass with skips.
        # Skips are expected for env-dependent tests (MULTI-001~008, Pulsar
        # broker, gRPC non-STUB). We accept exit 2 as green; exit 1 fails CI.
        id: run-tests
        continue-on-error: true
        run: ./testing/3_SystemTest/test-fullchain.sh

      - name: Fail on test failures (exit 1 only)
        # Exit codes: 0 = all pass, 1 = failures, 2 = pass with skips.
        # continue-on-error marks exit 2 as 'failure' too, so we re-run
        # the script's exit logic: only exit 1 should fail the workflow.
        if: steps.run-tests.outcome == 'failure'
        run: |
          # The script exited non-zero. Exit 2 (skips) is acceptable.
          # We check the actual exit code via the step's conclusion.
          # Since continue-on-error already caught it, we re-evaluate:
          #   exit 1 → fail workflow
          #   exit 2 → pass (skips are expected)
          echo "Step outcome: ${{ steps.run-tests.outcome }}"
          echo "Step conclusion: ${{ steps.run-tests.conclusion }}"
          # If the script exited with code 2, outcome is 'failure' but we accept it.
          # We can't directly read the exit code, so we rely on the script's
          # convention: exit 2 means "pass with skips" (not a real failure).
          # The JUnit XML report has the definitive pass/fail/skip counts.
          # If junit-report.xml exists and has 0 failures, we pass.
          if [ -f testing/3_SystemTest/junit-report.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' testing/3_SystemTest/junit-report.xml | head -1 | grep -o '[0-9]*')
            echo "JUnit failures count: $FAILURES"
            if [ "$FAILURES" = "0" ]; then
              echo "No failures in JUnit XML — exit was due to skips (exit 2). Passing."
              exit 0
            fi
          fi
          echo "Real test failures detected. Failing the workflow."
          exit 1

      - name: Upload JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: testing/3_SystemTest/junit-report.xml
          if-no-files-found: warn

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Full-Chain Test Report
          path: testing/3_SystemTest/junit-report.xml
          reporter: java-junit
