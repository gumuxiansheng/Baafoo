# =============================================================================
# Baafoo 娴间椒绗熺痪褍绨查悽銊︾ゴ鐠?- Spring Cloud Gateway
# 妤犲矁鐦?Agent 閸︺劎缍夐崗鍐茬湴閹凤附鍩呴妴浣界箖濠娿倕娅掗柧鎯у悑鐎瑰箍鈧浇鐭鹃悽杈祮閸欐垵婧€閺咁垯绗呴惃鍕厴閸?#
# 閻劍纭?
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # 閸氬海顏張宥呭閿涘牐鐭鹃悽杈╂窗閺嶅浄绱濇径宥囨暏 baafoo-test-spring閿?  # =========================================================================
  backend-service:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.backend
    container_name: baafoo-enterprise-gateway-backend
    networks:
      - baafoo-enterprise-net
    ports:
      - "18092:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway-backend
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Spring Cloud Gateway閿涘牊瀵曟潪?Baafoo Agent閿?  # 娴ｈ法鏁ょ€规ɑ鏌?spring-cloud-gateway 闂€婊冨剼閿涘矂鈧俺绻冮悳顖氼暔閸欐﹢鍣洪柊宥囩枂鐠侯垳鏁?  # =========================================================================
  gateway:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.gateway
    container_name: baafoo-enterprise-gateway
    networks:
      - baafoo-enterprise-net
    ports:
      - "18080:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms128m -Xmx256m
      - BACKEND_HOST=backend-service
      - BACKEND_PORT=9090
    depends_on:
      baafoo-server:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # 濞村鐦崚婵嗩潗閸栨牕顔愰崳?- 閸掓稑缂撳ù瀣槸閻滎垰顣ㄩ崪宀冾潐閸?  # =========================================================================
  gateway-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-gateway-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      gateway:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Spring Cloud Gateway 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫鍨垫慨瀣"
        echo "============================================"
        echo ""

        echo "[1/5] 閸掓稑缂?enterprise-gateway 閻滎垰顣?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway","mode":"stub","description":"Gateway娴间椒绗熺痪褎绁寸拠鏇犲箚婢?}' && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[2/5] 閸掓稑缂?enterprise-gateway-backend 閻滎垰顣?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway-backend","mode":"stub","description":"Gateway閸氬海顏ù瀣槸閻滎垰顣?}' && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[3/5] 閸掓稑缂?Gateway 鐠侯垳鏁?Mock 鐟欏嫬鍨敍鍫熷閹?/api/mock/** 鐠侯垰绶為敍?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"gateway-route-mock","name":"Gateway鐠侯垳鏁盡ock","protocol":"http","host":"gateway","port":8080,"conditions":[{"type":"path","operator":"startsWith","value":"/api/mock/"}],"responses":[{"name":"Mock缂冩垵鍙ч崫宥呯安","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-gateway\",\"path\":\"{{path}}\",\"timestamp\":\"{{now}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","route"],"environments":["enterprise-gateway"]}' && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[4/5] 閸掓稑缂撻崥搴ｎ伂 API Mock 鐟欏嫬鍨敍鍫熷閹搭亜鎮楃粩?/api/http/** 鐠侯垰绶為敍?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"backend-api-mock","name":"閸氬海顏珹PI Mock","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/http/"}],"responses":[{"name":"Mock閸氬海顏崫宥呯安","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-backend\",\"method\":\"{{method}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","backend"],"environments":["enterprise-gateway-backend"]}' && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[5/5] 妤犲矁鐦?Gateway 閸嬨儱鎮?.."
        curl -sf http://gateway:8080/actuator/health && echo "  OK" || echo "  娑撳秴褰叉潏?
        echo ""

        echo "============================================"
        echo "  Spring Cloud Gateway 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫姘ㄧ紒?
        echo "============================================"
        echo ""
        echo "  Baafoo閹貉冨煑閸? http://localhost:18084"
        echo "  Gateway:      http://localhost:18080"
        echo "  閸氬海顏張宥呭:     http://localhost:18092"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  濞村鐦捄顖滄暠:"
        echo "    GET  /api/http/health          -> 闁繋绱堕崚鏉挎倵缁?
        echo "    GET  /api/http/get?url=...     -> 闁繋绱堕崚鏉挎倵缁?HTTP 鐠嬪啰鏁?
        echo "    GET  /api/mock/test            -> 鐞?Gateway Agent Mock"
        echo "    GET  /api/backend/test         -> 闁繋绱堕崚鏉挎倵缁旑垰鎮楃悮?Mock"
        echo "============================================"
