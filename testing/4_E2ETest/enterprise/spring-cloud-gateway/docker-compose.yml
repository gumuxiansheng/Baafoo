# =============================================================================
# Baafoo 浼佷笟绾у簲鐢ㄦ祴璇?- Spring Cloud Gateway
# 楠岃瘉 Agent 鍦ㄧ綉鍏冲眰鎷︽埅銆佽繃婊ゅ櫒閾惧吋瀹广€佽矾鐢辫浆鍙戝満鏅笅鐨勮兘鍔?#
# 鐢ㄦ硶:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # 鍚庣鏈嶅姟锛堣矾鐢辩洰鏍囷紝澶嶇敤 baafoo-test-spring锛?  # =========================================================================
  backend-service:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.backend
    container_name: baafoo-enterprise-gateway-backend
    networks:
      - baafoo-enterprise-net
    ports:
      - "18092:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway-backend
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/api/stub-demo/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Spring Cloud Gateway锛堟寕杞?Baafoo Agent锛?  # 浣跨敤瀹樻柟 spring-cloud-gateway 闀滃儚锛岄€氳繃鐜鍙橀噺閰嶇疆璺敱
  # =========================================================================
  gateway:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.gateway
    container_name: baafoo-enterprise-gateway
    networks:
      - baafoo-enterprise-net
    ports:
      - "18080:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms128m -Xmx256m
      - BACKEND_HOST=backend-service
      - BACKEND_PORT=9090
    depends_on:
      baafoo-server:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # 娴嬭瘯鍒濆鍖栧鍣?- 鍒涘缓娴嬭瘯鐜鍜岃鍒?  # =========================================================================
  gateway-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-gateway-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      gateway:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Spring Cloud Gateway 浼佷笟绾ф祴璇曠幆澧冨垵濮嬪寲"
        echo "============================================"
        echo ""

        echo "[1/5] 鍒涘缓 enterprise-gateway 鐜..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway","mode":"stub","description":"Gateway浼佷笟绾ф祴璇曠幆澧?}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[2/5] 鍒涘缓 enterprise-gateway-backend 鐜..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway-backend","mode":"stub","description":"Gateway鍚庣娴嬭瘯鐜"}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[3/5] 鍒涘缓 Gateway 璺敱 Mock 瑙勫垯锛堟嫤鎴?/api/mock/** 璺緞锛?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"gateway-route-mock","name":"Gateway璺敱Mock","protocol":"http","host":"gateway","port":8080,"conditions":[{"type":"path","operator":"startsWith","value":"/api/mock/"}],"responses":[{"name":"Mock缃戝叧鍝嶅簲","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-gateway\",\"path\":\"{{path}}\",\"timestamp\":\"{{now}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","route"],"environments":["enterprise-gateway"]}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[4/5] 鍒涘缓鍚庣 API Mock 瑙勫垯锛堟嫤鎴悗绔?/api/http/** 璺緞锛?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"backend-api-mock","name":"鍚庣API Mock","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/http/"}],"responses":[{"name":"Mock鍚庣鍝嶅簲","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-backend\",\"method\":\"{{method}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","backend"],"environments":["enterprise-gateway-backend"]}' && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[5/5] 楠岃瘉 Gateway 鍋ュ悍..."
        curl -sf http://gateway:8080/actuator/health && echo "  OK" || echo "  涓嶅彲杈?
        echo ""

        echo "============================================"
        echo "  Spring Cloud Gateway 浼佷笟绾ф祴璇曠幆澧冨氨缁?
        echo "============================================"
        echo ""
        echo "  Baafoo鎺у埗鍙? http://localhost:18084"
        echo "  Gateway:      http://localhost:18080"
        echo "  鍚庣鏈嶅姟:     http://localhost:18092"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  娴嬭瘯璺敱:"
        echo "    GET  /api/http/health          -> 閫忎紶鍒板悗绔?
        echo "    GET  /api/http/get?url=...     -> 閫忎紶鍒板悗绔?HTTP 璋冪敤"
        echo "    GET  /api/mock/test            -> 琚?Gateway Agent Mock"
        echo "    GET  /api/backend/test         -> 閫忎紶鍒板悗绔悗琚?Mock"
        echo "============================================"
