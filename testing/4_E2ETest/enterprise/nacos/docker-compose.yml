# =============================================================================
# Baafoo 企业级应用测试 - Nacos 注册配置中心
# 验证 Agent 在 Nacos 服务注册/发现/配置场景下的拦截能力
#
# 用法:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Nacos Server（真实实例，用于 passthrough 模式对比测试）
  # =========================================================================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: baafoo-enterprise-nacos-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18848:8848"
      - "19848:9848"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - JVM_MS=32m
      - JVM_MMS=64m
      - JAVA_OPT=-XX:-UseContainerSupport
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # =========================================================================
  # 测试应用（挂载 Baafoo Agent，向 Nacos 注册并调用 Nacos API）
  # 复用 baafoo-test-spring，包含 HTTP 调用接口
  # =========================================================================
  nacos-test-app:
    build:
      context: ../../..
      dockerfile: testing/4_E2ETest/enterprise/nacos/Dockerfile.nacos-test-app
    container_name: baafoo-enterprise-nacos-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18091:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-nacos
      - SERVER_PORT=9090
      - NACOS_ADDR=nacos:8848
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/api/stub-demo/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # 测试初始化容器 - 创建测试环境和规则
  # =========================================================================
  nacos-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-nacos-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos-test-app:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Nacos 企业级测试环境初始化"
        echo "============================================"
        echo ""

        echo "[1/4] 创建 enterprise-nacos 环境..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-nacos","mode":"stub","description":"Nacos企业级测试环境"}' && echo "  OK" || echo "  已存在"
        echo ""

        echo "[2/4] 创建 Nacos 注册 API Mock 规则..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-register-mock","name":"Nacos注册API Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance"}],"responses":[{"name":"Mock注册响应","statusCode":200,"body":"{\"ok\":true,\"mocked\":true,\"source\":\"baafoo-nacos\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","register"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  已存在"
        echo ""

        echo "[3/4] 创建 Nacos 服务发现 API Mock 规则..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-discovery-mock","name":"Nacos服务发现Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance/list"}],"responses":[{"name":"Mock服务列表","statusCode":200,"body":"{\"name\":\"mock-service\",\"hosts\":[{\"instanceId\":\"mock-1\",\"ip\":\"192.168.1.100\",\"port\":8080,\"healthy\":true,\"enabled\":true}],\"mocked\":true}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","discovery"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  已存在"
        echo ""

        echo "[4/4] 创建 Nacos 配置拉取 API Mock 规则..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-config-mock","name":"Nacos配置拉取Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/cs/configs"}],"responses":[{"name":"Mock配置","statusCode":200,"body":"server.port=9999\nmock.config=true\nsource=baafoo-nacos","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","config"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  已存在"
        echo ""

        echo "============================================"
        echo "  Nacos 企业级测试环境就绪"
        echo "============================================"
        echo ""
        echo "  Baafoo控制台: http://localhost:18084"
        echo "  测试应用:     http://localhost:18091"
        echo "  Nacos控制台:  http://localhost:18848/nacos"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  测试接口:"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/ns/instance/list?serviceName=test"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/cs/configs?dataId=test&group=DEFAULT"
        echo "    POST /api/http/post?url=http://nacos:8848/nacos/v1/ns/instance?serviceName=test&ip=10.0.0.1&port=8080"
        echo "============================================"
