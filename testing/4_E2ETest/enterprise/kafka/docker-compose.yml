# =============================================================================
# Baafoo 娴间椒绗熺痪褍绨查悽銊︾ゴ鐠?- Apache Kafka
# 妤犲矁鐦?Agent 閸︺劎婀＄€?Kafka 閻滎垰顣ㄦ稉瀣畱閹凤附鍩呴懗钘夊閸滃苯鍚嬬€硅鈧?
#
# 閻劍纭?
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Kafka Broker閿涘牏婀＄€?Kafka閿涘瞼鏁ゆ禍?passthrough 濡€崇础鐎佃鐦ù瀣槸閿?
  # =========================================================================
  kafka:
    # Apache official Kafka image (KRaft mode). Previously used soldevelo/kafka
    # (bitnami fork) but it generated a new random cluster ID on every restart,
    # causing infinite restart loops. apache/kafka uses a stable CLUSTER_ID env var.
    image: apache/kafka:latest
    container_name: baafoo-enterprise-kafka
    networks:
      - baafoo-enterprise-net
    ports:
      - "19092:9092"
      - "19093:9093"
    environment:
      # apache/kafka uses KAFKA_* env vars (not bitnami's KAFKA_CFG_* prefix)
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # Stable cluster ID 閳?prevents random ID regeneration on restart
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      # apache/kafka doesn't put kafka-topics.sh on PATH for CMD-SHELL 閳?use absolute path
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  # =========================================================================
  # Kafka 鐎广垺鍩涚粩顖涚ゴ鐠囨洖绨查悽顭掔礄閹稿倽娴?Baafoo Agent閿?
  # 婢跺秶鏁?baafoo-test-spring閿涘苯瀵橀崥?Kafka Producer/Consumer 濞村鐦幒銉ュ經
  # =========================================================================
  kafka-test-app:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/kafka/Dockerfile.kafka-test-app
    container_name: baafoo-enterprise-kafka-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18090:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-kafka
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # 濞村鐦崚婵嗩潗閸栨牕顔愰崳?- 閸掓稑缂撳ù瀣槸閻滎垰顣ㄩ崪宀冾潐閸?
  # =========================================================================
  kafka-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-kafka-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka-test-app:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  Kafka 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫鍨垫慨瀣"
        echo "============================================"
        echo ""

        echo "[1/5] 閸掓稑缂?enterprise-kafka 閻滎垰顣?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-kafka\",\"mode\":\"stub\",\"description\":\"Kafka娴间椒绗熺痪褎绁寸拠鏇犲箚婢у儨"}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[2/5] 閸掓稑缂?Kafka Topic 缁墽鈥橀崠褰掑帳鐟欏嫬鍨?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-exact\",\"name\":\"Kafka娴间椒绗熺痪?Topic缁墽鈥橀崠褰掑帳\",\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"equals\",\"value\":\"enterprise-test-topic\"}],\"responses\":[{\"name\":\"Mock閸濆秴绨瞈",\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-enterprise-kafka\\\",\\\"timestamp\\\":\\\"{{now}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[3/5] 閸掓稑缂?Kafka Topic 闁岸鍘ょ粭锕€灏柊宥堫潐閸?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-wildcard\",\"name\":\"Kafka娴间椒绗熺痪?Topic闁岸鍘ょ粭锕€灏柊宄?,\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"startsWith\",\"value\":\"enterprise-\"}],\"responses\":[{\"name\":\"Mock閸濆秴绨?闁岸鍘ょ粭?\",\"body\":\"{\\\"mocked\\\":true,\\\"wildcard\\\":true,\\\"topic\\\":\\\"{{topic}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":50,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[4/5] 妤犲矁鐦夊ù瀣槸鎼存梻鏁ら崑銉ユ倣閻樿埖鈧?.."
        curl -sf http://kafka-test-app:9090/api/stub-demo/health && echo "  OK" || echo "  娑撳秴褰叉潏?
        echo ""

        echo "[5/5] 閸︺劎婀＄€?Kafka 閸掓稑缂撳ù瀣槸 Topic..."
        echo "  缁涘绶?Kafka 閼奉亜濮╅崚娑樼紦 Topic..."
        echo ""

        echo "============================================"
        echo "  Kafka 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫姘ㄧ紒?
        echo "============================================"
        echo ""
        echo "  Baafoo閹貉冨煑閸? http://localhost:18084"
        echo "  濞村鐦惔鏃傛暏:      http://localhost:18090"
        echo "  Kafka:         localhost:19092 (婢舵牠鍎?"
        echo "                 kafka:9092 (鐎圭懓娅掗崘?"
        echo "  API Key:       enterprise-admin-key"
        echo ""
        echo "  濞村鐦幒銉ュ經:"
        echo "    POST /api/stub-demo/kafka/send - 閸欐垿鈧甫afka濞戝牊浼?
        echo "    POST /api/stub-demo/kafka/consume - 濞戝牐鍨侹afka濞戝牊浼?
        echo "============================================"
      '
