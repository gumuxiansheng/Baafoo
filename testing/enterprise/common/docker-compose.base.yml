version: "3.8"

networks:
  baafoo-enterprise-net:
    driver: bridge

services:
  baafoo-server:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: baafoo-enterprise-server
    networks:
      - baafoo-enterprise-net
    ports:
      - "18084:8084"
      - "19000:9000"
      - "19001:9001"
      - "19002:9002"
      - "19003:9003"
      - "19004:9004"
      - "19005:9005"
    environment:
      - BAAFOO_HTTP_PORT=8084
      - BAAFOO_DB_TYPE=h2
      - JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - ../common/baafoo-server-enterprise.yml:/app/baafoo-server.yml:ro
      - baafoo-enterprise-data:/home/baafoo/.baafoo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/__baafoo__/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

volumes:
  baafoo-enterprise-data:
