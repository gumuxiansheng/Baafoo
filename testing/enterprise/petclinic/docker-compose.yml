# =============================================================================
# Baafoo 企业级应用测试 - Spring Boot PetClinic
# 验证 Agent 在经典 Spring Boot 企业应用中的兼容性
#
# 用法:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # PetClinic 应用（挂载 Baafoo Agent）
  # =========================================================================
  petclinic:
    build:
      context: ../../..
      dockerfile: testing/enterprise/petclinic/Dockerfile.petclinic
    container_name: baafoo-enterprise-petclinic
    networks:
      - baafoo-enterprise-net
    ports:
      - "19966:9966"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-petclinic
      - SERVER_PORT=9966
      - JAVA_OPTS=-Xms256m -Xmx512m
      - SPRING_PROFILES_ACTIVE=h2
    volumes:
      - ./baafoo-agent-petclinic.yml:/app/baafoo-agent.yml:ro
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9966/petclinic/api/vets || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # 测试初始化容器 - 创建测试环境和规则
  # =========================================================================
  petclinic-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-petclinic-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      petclinic:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  PetClinic 企业级测试环境初始化"
        echo "============================================"
        echo ""

        echo "[1/4] 创建 enterprise-petclinic 环境..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-petclinic\",\"mode\":\"stub\",\"description\":\"PetClinic企业级测试环境\"}" && echo "  OK" || echo "  已存在"
        echo ""

        echo "[2/4] 创建 Vet API Mock 规则..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-vets-mock\",\"name\":\"PetClinic-Vet API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":9966,\"conditions\":[{\"type\":\"path\",\"operator\":\"equals\",\"value\":\"/petclinic/api/vets\"}],\"responses\":[{\"name\":\"Mock兽医列表\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"vets\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Doctor\\\",\\\"specialties\\\":[{\\\"name\\\":\\\"Mock Surgery\\\"}]}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  已存在"
        echo ""

        echo "[3/4] 创建 Owner API Mock 规则..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-owners-mock\",\"name\":\"PetClinic-Owner API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":9966,\"conditions\":[{\"type\":\"path\",\"operator\":\"startsWith\",\"value\":\"/petclinic/api/owners\"}],\"responses\":[{\"name\":\"Mock业主列表\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"content\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Owner\\\",\\\"city\\\":\\\"Mock City\\\",\\\"telephone\\\":\\\"1234567890\\\"}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  已存在"
        echo ""

        echo "[4/4] 验证 PetClinic 应用健康状态..."
        curl -sf http://petclinic:9966/petclinic/api/vets && echo "  OK" || echo "  不可达"
        echo ""

        echo "============================================"
        echo "  PetClinic 企业级测试环境就绪"
        echo "============================================"
        echo ""
        echo "  Baafoo控制台: http://localhost:18084"
        echo "  PetClinic:    http://localhost:19966/petclinic/"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  测试API:"
        echo "    GET /petclinic/api/vets - 兽医列表"
        echo "    GET /petclinic/api/owners - 业主列表"
        echo "============================================"
      '
