# =============================================================================
# Baafoo Staging — Multi-Agent Override (JaCoCo + SkyWalking + Baafoo)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml \
#                  -f docker-compose.multi-agent.yml up -d --build
#
# This file overrides app-env-a to attach JaCoCo + SkyWalking agents alongside
# Baafoo, and starts a SkyWalking OAP backend container.
# =============================================================================

services:

  # =========================================================================
  # SkyWalking OAP — Observability Analysis Platform backend
  # Receives trace data from SkyWalking agent via gRPC (port 11800)
  # H2 storage (default, no Elasticsearch needed)
  # =========================================================================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.4.0-java17
    container_name: baafoo-staging-oap
    networks:
      baafoo-staging-net:
        aliases:
          - skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m
      - SW_STORAGE=h2
      - SW_HEALTH_CHECKER=default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:12800/internal/l7check || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  # =========================================================================
  # app-env-a — Multi-Agent override
  # Attaches JaCoCo + SkyWalking + Baafoo (order: jacoco → skywalking → baafoo)
  # =========================================================================
  app-env-a:
    build:
      context: .
      dockerfile: baafoo-test-spring/Dockerfile.multi-agent
    environment:
      - BAAFOO_SERVER_HOST=server
      - BAAFOO_ENV=staging-a
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m -Dhttp.keepAlive=false -Dhttp.maxConnections=1
      # SkyWalking agent config
      - SW_AGENT_NAME=service-consumer
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=skywalking-oap:11800
      # JaCoCo agent config
      - JACOCO_PORT=6300
    volumes:
      - ./deploy/staging/baafoo-agent-env-a.yml:/app/baafoo-agent.yml:ro
      - ./plugins:/app/plugins:ro
      # SkyWalking agent directory (extracted, includes plugins + config)
      - ./testing/4_E2ETest/enterprise/spring-cloud-alibaba/agents/skywalking-agent:/app/agents/skywalking:ro
      # JaCoCo agent JAR
      - ./testing/4_E2ETest/enterprise/spring-cloud-alibaba/agents/jacoco-agent.jar:/app/agents/jacoco-agent.jar:ro
    depends_on:
      server:
        condition: service_healthy
      skywalking-oap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/api/stub-demo/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped
