# Baafoo Agent Configuration — 本地宿主机测试
# 用于从宿主机连接 Docker 中的 Baafoo Server

server:
  host: "127.0.0.1"
  useSsl: false
  apiPort: 8084
  httpPort: 9000
  tcpPort: 9001
  kafkaPort: 9002
  pulsarPort: 9003
  jmsPort: 9004

environment: "staging-c"

heartbeatIntervalSec: 30
pollIntervalSec: 10

consulEnabled: false
consulAddress: "localhost:8500"

protocols: []

maxRecordingSize: 10485760

rulesFilePath: ""
hotReload: true

failOpen: false

connectionRetries: 5
retryBackoffMs: 2000
