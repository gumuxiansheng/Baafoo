# Baafoo Agent Configuration
# Loaded by com.baafoo.core.config.ConfigLoader

# Server connection configuration
server:
  # Server host (used for both control channel and stub redirection)
  host: "127.0.0.1"
  # Whether to use HTTPS for the control channel (default: false)
  useSsl: false
  # Server API port (control channel, default 8084)
  apiPort: 8084
  # Protocol-specific stub ports (must match Server configuration)
  httpPort: 9000
  tcpPort: 9001
  kafkaPort: 9002
  pulsarPort: 9003
  jmsPort: 9004

# Agent unique identifier (auto-generated if empty)
agentId: ""

# Environment name this agent belongs to
environment: "test-env"

# Heartbeat interval in seconds
heartbeatIntervalSec: 30

# Rule polling interval in seconds
pollIntervalSec: 10

# Whether Consul service discovery interception is enabled
consulEnabled: false

# Consul address (e.g., localhost:8500)
consulAddress: "localhost:8500"

# Protocols to intercept (empty = all)
protocols: []

# Maximum recording size in bytes
maxRecordingSize: 10485760

# Rule file path for hot-reload (WatchService)
rulesFilePath: ""

# Whether to enable hot-reload of rule files
hotReload: true

# Fail-open mode: when true, Agent initialization failures are silently ignored.
# When false (default), Agent logs ERROR but all requests still pass through.
# Corresponds to baafoo.agent.fail-open config key.
failOpen: false

# Retry count for server connection
connectionRetries: 3

# Retry backoff base interval in milliseconds
retryBackoffMs: 1000
