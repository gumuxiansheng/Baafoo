<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baafoo Web 控制台 — UI 框架原型 v1.4 (Vue 3 + Element Plus)</title>
<style>
/* ===== Design Tokens ===== */
:root {
  --color-primary: #409EFF;
  --color-primary-light: #66B1FF;
  --color-success: #67C23A;
  --color-warning: #E6A23C;
  --color-danger: #F56C6C;
  --color-info: #909399;
  --bg-page: #F2F3F5;
  --bg-card: #FFFFFF;
  --bg-sidebar: #304156;
  --bg-sidebar-hover: #263445;
  --bg-sidebar-active: #1D2B3A;
  --text-primary: #303133;
  --text-regular: #606266;
  --text-secondary: #909399;
  --text-sidebar: #BFCBD9;
  --text-sidebar-active: #FFFFFF;
  --border-color: #DCDFE6;
  --border-light: #E4E7ED;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,0.06);
  --font-ui: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  --font-code: "JetBrains Mono", "Fira Code", "Consolas", monospace;
  --header-h: 48px;
  --sidebar-w: 220px;
  --statusbar-h: 32px;
}
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: var(--font-ui); font-size: 14px; color: var(--text-primary); background: var(--bg-page); }

/* ===== Layout ===== */
.app-layout { display: flex; flex-direction: column; height: 100vh; }

/* Header */
.app-header {
  height: var(--header-h); background: #fff; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; padding: 0 20px; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); flex-shrink: 0;
}
.app-header .logo { font-size: 18px; font-weight: 700; color: var(--color-primary); margin-right: 32px; letter-spacing: 1px; }
.app-header .logo span { color: var(--text-regular); font-weight: 400; font-size: 13px; margin-left: 4px; }
.app-header .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.agent-status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-regular); }
.agent-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--color-success); }
.agent-indicator.off { background: var(--color-info); }
.agent-count { font-weight: 600; color: var(--color-success); }
.env-badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: #ECF5FF; color: var(--color-primary); margin-left: 8px; }

/* Body */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.app-sidebar {
  width: var(--sidebar-w); background: var(--bg-sidebar); flex-shrink: 0;
  display: flex; flex-direction: column; overflow-y: auto; transition: width 0.3s;
}
.sidebar-menu { list-style: none; padding: 8px 0; }
.sidebar-menu li a {
  display: flex; align-items: center; padding: 12px 20px; color: var(--text-sidebar);
  text-decoration: none; font-size: 14px; transition: all 0.15s; gap: 8px;
}
.sidebar-menu li a:hover { background: var(--bg-sidebar-hover); color: #fff; }
.sidebar-menu li a.active { background: var(--bg-sidebar-active); color: var(--text-sidebar-active); }
.sidebar-menu li a .icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-menu .submenu { padding-left: 28px; }
.sidebar-menu .submenu a { padding: 8px 20px; font-size: 13px; }
.sidebar-menu .submenu a .badge {
  margin-left: auto; background: rgba(255,255,255,0.15); color: var(--text-sidebar);
  padding: 0 6px; border-radius: 10px; font-size: 11px; min-width: 20px; text-align: center;
}
.sidebar-menu .section-title { padding: 16px 20px 8px; font-size: 12px; color: rgba(191,203,217,0.5); letter-spacing: 1px; text-transform: uppercase; }

/* Main Content */
.app-main { flex: 1; overflow-y: auto; padding: 24px; }

/* Status Bar */
.app-statusbar {
  height: var(--statusbar-h); background: #fff; border-top: 1px solid var(--border-light);
  display: flex; align-items: center; padding: 0 20px; font-size: 12px; color: var(--text-secondary);
  gap: 24px; flex-shrink: 0;
}
.app-statusbar .port-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.port-dot.on { background: var(--color-success); }
.port-dot.off { background: var(--color-info); }
.app-statusbar .spacer { margin-left: auto; }

/* ===== Page Components ===== */
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }

/* Stat Cards */
.stat-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: #fff; border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 16px;
}
.stat-card .card-icon {
  width: 48px; height: 48px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
}
.stat-card .card-icon.blue { background: #ECF5FF; color: var(--color-primary); }
.stat-card .card-icon.green { background: #F0F9EB; color: var(--color-success); }
.stat-card .card-icon.orange { background: #FDF6EC; color: var(--color-warning); }
.stat-card .card-icon.purple { background: #F4F0FE; color: #8B7CF6; }
.stat-card .card-icon.teal { background: #E6FAFF; color: #13C2C2; }
.stat-card .card-value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
.stat-card .card-label { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Charts Row */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card {
  background: #fff; border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow-card);
}
.chart-card .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
.chart-placeholder {
  height: 200px; background: var(--bg-page); border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
  font-size: 13px;
}
.chart-placeholder svg { width: 100%; height: 100%; }

/* Recent Table */
.recent-card {
  background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-card);
}
.recent-card .recent-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; padding: 10px 12px; color: var(--text-secondary); font-weight: 500;
  border-bottom: 1px solid var(--border-light); font-size: 12px;
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
.data-table tr:hover td { background: #F5F7FA; }
.data-table .protocol-tag {
  display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 500;
}
.protocol-tag.http { background: #ECF5FF; color: var(--color-primary); }
.protocol-tag.tcp { background: #F0F9EB; color: var(--color-success); }
.protocol-tag.pulsar { background: #FDF6EC; color: var(--color-warning); }
.protocol-tag.kafka { background: #F4F0FE; color: #8B7CF6; }
.env-tag {
  display: inline-block; padding: 0 5px; border-radius: 8px; font-size: 10px;
  background: #E6F7FF; border: 1px solid #91D5FF; color: #1890FF; margin: 1px;
}
.status-code { font-weight: 600; }
.status-code.s200 { color: var(--color-success); }
.status-code.s404 { color: var(--color-warning); }
.status-code.s500 { color: var(--color-danger); }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.toolbar .btn {
  padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px; border: none; cursor: pointer;
  font-family: var(--font-ui); transition: all 0.15s;
}
.toolbar .btn-primary { background: var(--color-primary); color: #fff; }
.toolbar .btn-primary:hover { background: var(--color-primary-light); }
.toolbar .btn-default { background: #fff; color: var(--text-regular); border: 1px solid var(--border-color); }
.toolbar .btn-default:hover { border-color: var(--color-primary); color: var(--color-primary); }
.toolbar .btn-success { background: var(--color-success); color: #fff; }
.toolbar .btn-success:hover { opacity: 0.85; }
.toolbar .spacer { flex: 1; }

/* Protocol Tabs */
.protocol-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border-light); }
.protocol-tabs .tab {
  padding: 10px 20px; font-size: 14px; cursor: pointer; color: var(--text-secondary);
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
}
.protocol-tabs .tab:hover { color: var(--color-primary); }
.protocol-tabs .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
.protocol-tabs .tab .tab-badge {
  display: inline-block; background: var(--bg-page); padding: 0 6px; border-radius: 10px;
  font-size: 11px; margin-left: 4px; color: var(--text-secondary);
}
.protocol-tabs .tab.active .tab-badge { background: #ECF5FF; color: var(--color-primary); }

/* Environment Filter */
.env-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.env-filter label { font-size: 13px; color: var(--text-secondary); }
.env-filter select {
  border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 4px 8px;
  font-size: 13px; color: var(--text-primary); background: #fff; cursor: pointer;
}

/* Rule cards view */
.rule-list { display: flex; flex-direction: column; gap: 8px; }
.rule-item {
  display: flex; align-items: center; background: #fff; padding: 14px 16px;
  border-radius: var(--radius-md); border: 1px solid var(--border-light); transition: all 0.15s;
}
.rule-item:hover { border-color: var(--color-primary); box-shadow: var(--shadow-card); }
.rule-item .rule-checkbox { margin-right: 12px; }
.rule-item .rule-info { flex: 1; }
.rule-item .rule-id { font-weight: 600; font-size: 13px; color: var(--text-primary); }
.rule-item .rule-match { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-family: var(--font-code); }
.rule-item .rule-actions { display: flex; gap: 8px; }
.rule-item .action-link { color: var(--color-primary); cursor: pointer; font-size: 13px; text-decoration: none; }
.rule-item .action-link:hover { text-decoration: underline; }
.rule-item .action-link.danger { color: var(--color-danger); }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--color-info); border-radius: 22px; transition: 0.2s;
}
.toggle .slider:before {
  position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
  background: white; border-radius: 50%; transition: 0.2s;
}
.toggle input:checked + .slider { background: var(--color-success); }
.toggle input:checked + .slider:before { transform: translateX(18px); }

/* ===== Status Page ===== */
.status-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
.status-card {
  background: #fff; border-radius: var(--radius-lg); padding: 16px;
  box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 12px;
}
.status-card .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.status-card .status-dot.online { background: var(--color-success); }
.status-card .status-dot.offline { background: var(--color-info); }
.status-card .status-label { font-size: 13px; color: var(--text-secondary); }
.status-card .status-port { font-weight: 700; font-size: 16px; color: var(--text-primary); }

.metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
.metric-item { background: #fff; padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
.metric-item .metric-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.metric-item .metric-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.version-card {
  background: #fff; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card);
}
.version-card .version-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.version-card .version-row:last-child { border-bottom: none; }
.version-card .version-key { color: var(--text-secondary); }
.version-card .version-val { color: var(--text-primary); font-weight: 500; font-family: var(--font-code); font-size: 12px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state .empty-title { font-size: 16px; font-weight: 600; color: var(--text-regular); margin-bottom: 8px; }
.empty-state .empty-desc { font-size: 13px; margin-bottom: 16px; }

/* ===== Editor Page (dual panel) ===== */
.editor-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; height: calc(100vh - var(--header-h) - var(--statusbar-h) - 48px); }
.editor-form { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-card); overflow-y: auto; }
.editor-form .form-section { margin-bottom: 20px; }
.editor-form .form-section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }
.editor-form .form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
.editor-form .form-label { font-size: 13px; color: var(--text-regular); min-width: 70px; padding-top: 7px; flex-shrink: 0; }
.editor-form .form-input {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: var(--radius-md);
  font-size: 13px; font-family: var(--font-ui); outline: none; transition: border 0.15s;
}
.editor-form .form-input:focus { border-color: var(--color-primary); }
.editor-form .form-textarea {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: var(--radius-md);
  font-size: 13px; font-family: var(--font-code); resize: vertical; min-height: 80px; outline: none;
}
.editor-form .form-textarea:focus { border-color: var(--color-primary); }
.editor-form .form-select {
  padding: 6px 10px; border: 1px solid var(--border-color); border-radius: var(--radius-md);
  font-size: 13px; background: #fff; outline: none;
}

.condition-block {
  background: var(--bg-page); border-radius: var(--radius-md); padding: 12px; margin-bottom: 8px;
  border: 1px solid var(--border-light);
}
.condition-block .cond-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.condition-block .cond-title { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

.editor-preview {
  background: #1E1E1E; border-radius: var(--radius-lg); padding: 20px; color: #D4D4D4;
  font-family: var(--font-code); font-size: 13px; line-height: 1.6; overflow-y: auto; white-space: pre;
  box-shadow: var(--shadow-card);
}
.editor-preview .yaml-key { color: #9CDCFE; }
.editor-preview .yaml-string { color: #CE9178; }
.editor-preview .yaml-number { color: #B5CEA8; }
.editor-preview .yaml-comment { color: #6A9955; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.breadcrumb a { color: var(--color-primary); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--text-secondary); }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
.badge.enabled { background: #F0F9EB; color: var(--color-success); }
.badge.disabled { background: #F4F4F5; color: var(--color-info); }

/* ===== Recording Cards ===== */
.rec-card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.rec-card {
  background: #fff; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card);
}
.rec-card .rec-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; justify-content: space-between; }
.rec-card .rec-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.rec-card .rec-proto { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.rec-card .rec-actions { display: flex; gap: 8px; }

/* ===== Environment Management Page (NEW) ===== */
.env-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.env-card {
  background: #fff; border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow-card); border: 2px solid transparent; transition: all 0.15s;
}
.env-card.active { border-color: var(--color-primary); }
.env-card .env-name { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.env-card .env-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.env-card .env-mode {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 12px;
}
.env-mode.stub { background: #F0F9EB; color: var(--color-success); }
.env-mode.passthrough { background: #ECF5FF; color: var(--color-primary); }
.env-mode.record { background: #FDF6EC; color: var(--color-warning); }
.env-mode.record-and-stub { background: #F4F0FE; color: #8B7CF6; }
.env-card .env-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.env-card .env-agents { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
.env-card .env-agents-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
.env-card .env-agent-item { font-size: 12px; color: var(--text-regular); padding: 2px 0; font-family: var(--font-code); }
.env-card .env-actions { display: flex; gap: 8px; margin-top: 16px; }

.mode-select-inline { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.mode-select-inline label { font-size: 13px; color: var(--text-secondary); }
.mode-select-inline select {
  border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 6px 12px;
  font-size: 13px; color: var(--text-primary); background: #fff; cursor: pointer;
}

/* ===== Agent Table ===== */
.agent-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.agent-table th {
  text-align: left; padding: 10px 12px; color: var(--text-secondary); font-weight: 500;
  border-bottom: 1px solid var(--border-light); font-size: 12px;
}
.agent-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
.agent-table tr:hover td { background: #F5F7FA; }
.agent-mode-tag {
  display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500;
}
.agent-mode-tag.stub { background: #F0F9EB; color: var(--color-success); }
.agent-mode-tag.passthrough { background: #ECF5FF; color: var(--color-primary); }
.agent-mode-tag.record { background: #FDF6EC; color: var(--color-warning); }
.agent-mode-tag.record-and-stub { background: #F4F0FE; color: #8B7CF6; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .app-sidebar { width: 0; overflow: hidden; }
  .stat-cards { grid-template-columns: repeat(2, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .editor-layout { grid-template-columns: 1fr; }
  .status-grid { grid-template-columns: repeat(2, 1fr); }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .rec-card-grid { grid-template-columns: 1fr; }
  .env-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app-layout">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="logo">Baafoo<span>挡板控制台</span></div>
    <div class="header-right">
      <div class="agent-status">
        <span class="agent-indicator" title="Agent 已连接"></span>
        Agent 已连接 <span class="agent-count">(5)</span>
      </div>
    </div>
  </header>

  <!-- ===== BODY ===== -->
  <div class="app-body">

    <!-- ===== SIDEBAR ===== -->
    <nav class="app-sidebar">
      <ul class="sidebar-menu">
        <li><a href="#" onclick="showPage('dashboard')" class="active" id="nav-dashboard">
          <span class="icon">📊</span> 控制台首页
        </a></li>
        <li class="section-title">规则管理</li>
        <li><a href="#" onclick="showPage('rules')" id="nav-rules">
          <span class="icon">📋</span> 规则管理
        </a></li>
        <li class="submenu">
          <a href="#" onclick="showPage('rules')" id="nav-rules-http">HTTP<span class="badge">12</span></a>
          <a href="#" onclick="showPage('rules')" id="nav-rules-tcp">TCP<span class="badge">4</span></a>
          <a href="#" onclick="showPage('rules')" id="nav-rules-kafka">Kafka (Beta)<span class="badge">3 β</span></a>
          <a href="#" onclick="showPage('rules')" id="nav-rules-pulsar">Pulsar<span class="badge">2</span></a>
          <a href="#" onclick="showPage('rules')" id="nav-rules-jms">JMS<span class="badge">2</span></a>
        </li>
        <li><a href="#" onclick="showPage('scenes')" id="nav-scenes">
          <span class="icon">🎭</span> 场景集管理
        </a></li>
        <li class="section-title">环境</li>
        <li><a href="#" onclick="showPage('environments')" id="nav-environments">
          <span class="icon">🌐</span> 环境管理

  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main-content');
  switch(name) {
    case 'dashboard': main.innerHTML = pages.dashboard(); break;
    case 'rules': main.innerHTML = pages.rules(); break;
    case 'scenes': main.innerHTML = pages.scenes(); break;

}

            <span class="yaml-string"> "status":"active"}</span>
