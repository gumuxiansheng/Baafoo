# =============================================================================
# Baafoo 浼佷笟绾у簲鐢ㄦ祴璇?- Apache Kafka
# 楠岃瘉 Agent 鍦ㄧ湡瀹?Kafka 鐜涓嬬殑鎷︽埅鑳藉姏鍜屽吋瀹规€?
#
# 鐢ㄦ硶:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Kafka Broker锛堢湡瀹?Kafka锛岀敤浜?passthrough 妯″紡瀵规瘮娴嬭瘯锛?
  # =========================================================================
  kafka:
    # Apache official Kafka image (KRaft mode). Previously used soldevelo/kafka
    # (bitnami fork) but it generated a new random cluster ID on every restart,
    # causing infinite restart loops. apache/kafka uses a stable CLUSTER_ID env var.
    image: apache/kafka:latest
    container_name: baafoo-enterprise-kafka
    networks:
      - baafoo-enterprise-net
    ports:
      - "19092:9092"
      - "19093:9093"
    environment:
      # apache/kafka uses KAFKA_* env vars (not bitnami's KAFKA_CFG_* prefix)
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # Stable cluster ID 鈥?prevents random ID regeneration on restart
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      # apache/kafka doesn't put kafka-topics.sh on PATH for CMD-SHELL 鈥?use absolute path
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  # =========================================================================
  # Kafka 瀹㈡埛绔祴璇曞簲鐢紙鎸傝浇 Baafoo Agent锛?
  # 澶嶇敤 baafoo-test-spring锛屽寘鍚?Kafka Producer/Consumer 娴嬭瘯鎺ュ彛
  # =========================================================================
  kafka-test-app:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/kafka/Dockerfile.kafka-test-app
    container_name: baafoo-enterprise-kafka-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18090:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-kafka
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/api/stub-demo/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # 娴嬭瘯鍒濆鍖栧鍣?- 鍒涘缓娴嬭瘯鐜鍜岃鍒?
  # =========================================================================
  kafka-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-kafka-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka-test-app:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  Kafka 浼佷笟绾ф祴璇曠幆澧冨垵濮嬪寲"
        echo "============================================"
        echo ""

        echo "[1/5] 鍒涘缓 enterprise-kafka 鐜..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-kafka\",\"mode\":\"stub\",\"description\":\"Kafka浼佷笟绾ф祴璇曠幆澧僜"}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[2/5] 鍒涘缓 Kafka Topic 绮剧‘鍖归厤瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-exact\",\"name\":\"Kafka浼佷笟绾?Topic绮剧‘鍖归厤\",\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"equals\",\"value\":\"enterprise-test-topic\"}],\"responses\":[{\"name\":\"Mock鍝嶅簲\",\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-enterprise-kafka\\\",\\\"timestamp\\\":\\\"{{now}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[3/5] 鍒涘缓 Kafka Topic 閫氶厤绗﹀尮閰嶈鍒?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-wildcard\",\"name\":\"Kafka浼佷笟绾?Topic閫氶厤绗﹀尮閰峔",\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"startsWith\",\"value\":\"enterprise-\"}],\"responses\":[{\"name\":\"Mock鍝嶅簲(閫氶厤绗?\",\"body\":\"{\\\"mocked\\\":true,\\\"wildcard\\\":true,\\\"topic\\\":\\\"{{topic}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":50,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[4/5] 楠岃瘉娴嬭瘯搴旂敤鍋ュ悍鐘舵€?.."
        curl -sf http://kafka-test-app:9090/api/stub-demo/health && echo "  OK" || echo "  涓嶅彲杈?
        echo ""

        echo "[5/5] 鍦ㄧ湡瀹?Kafka 鍒涘缓娴嬭瘯 Topic..."
        echo "  绛夊緟 Kafka 鑷姩鍒涘缓 Topic..."
        echo ""

        echo "============================================"
        echo "  Kafka 浼佷笟绾ф祴璇曠幆澧冨氨缁?
        echo "============================================"
        echo ""
        echo "  Baafoo鎺у埗鍙? http://localhost:18084"
        echo "  娴嬭瘯搴旂敤:      http://localhost:18090"
        echo "  Kafka:         localhost:19092 (澶栭儴)"
        echo "                 kafka:9092 (瀹瑰櫒鍐?"
        echo "  API Key:       enterprise-admin-key"
        echo ""
        echo "  娴嬭瘯鎺ュ彛:"
        echo "    POST /api/stub-demo/kafka/send - 鍙戦€並afka娑堟伅"
        echo "    POST /api/stub-demo/kafka/consume - 娑堣垂Kafka娑堟伅"
        echo "============================================"
      '
