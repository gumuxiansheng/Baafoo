server:
  host: "baafoo-server"
  useSsl: false
  apiPort: 8084
  httpPort: 9000
  tcpPort: 9001
  kafkaPort: 9002
  pulsarPort: 9003
  jmsPort: 9004
  apiKey: "enterprise-admin-key"

environment: "enterprise-sca-consumer"

heartbeatIntervalSec: 30
pollIntervalSec: 10

# Service-name interception is always enabled (mounted by default in BaafooAgent).
# DnsResolveAdvice intercepts InetAddress.getByName("service-provider") and
# redirects to Baafoo Server when a rule with serviceName=service-provider exists.
# HttpOpenServerAdvice intercepts HttpClient.openServer to redirect port (preserving Host header).
# Registry-agnostic: works with Nacos, Consul, Eureka, or any registry.
# Result: Feign call to http://service-provider/echo/* is mocked at the DNS layer.

protocols:
  - http

maxRecordingSize: 10485760

rulesFilePath: ""
hotReload: true

failOpen: false

connectionRetries: 5
retryBackoffMs: 2000

plugins:
  enabled: true
  directory: "./plugins"
  configs: {}
