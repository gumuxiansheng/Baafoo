# Baafoo Staging Agent Configuration — 环境B
# 用于 staging-b 环境的Agent配置

server:
  host: "server"
  useSsl: false
  apiPort: 8084
  httpPort: 9000
  tcpPort: 9001
  kafkaPort: 9002
  pulsarPort: 9003
  jmsPort: 9004
  apiKey: "staging-admin-key"

environment: "staging-b"

heartbeatIntervalSec: 30
pollIntervalSec: 10

protocols: []

maxRecordingSize: 10485760

rulesFilePath: ""
hotReload: true

failOpen: false

connectionRetries: 5
retryBackoffMs: 2000
