# =============================================================================
# Baafoo Enterprise Test - Spring Boot PetClinic
# Verifies Agent compatibility with classic Spring Boot enterprise apps
#
# Usage:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # PetClinic application with Baafoo Agent
  # Java 17 Spring Boot app, port 8080, health endpoint /vets
  # =========================================================================
  petclinic:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/petclinic/Dockerfile.petclinic
    container_name: baafoo-enterprise-petclinic
    networks:
      - baafoo-enterprise-net
    ports:
      - "19966:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-petclinic
      - SERVER_PORT=8080
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms256m -Xmx512m --add-opens java.base/java.net=ALL-UNNAMED
      - SPRING_PROFILES_ACTIVE=h2,spring-data-jpa
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/vets 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # =========================================================================
  # Init container - create environment and register mock rules
  # =========================================================================
  petclinic-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-petclinic-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      petclinic:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  PetClinic enterprise test init"
        echo "============================================"
        echo ""

        echo "[1/4] Create environment enterprise-petclinic..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-petclinic\",\"mode\":\"stub\",\"description\":\"PetClinic enterprise test environment\"}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[2/4] Create Vet API Mock rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-vets-mock\",\"name\":\"PetClinic-Vet API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"equals\",\"value\":\"/vets\"}],\"responses\":[{\"name\":\"Mock Vet Response\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"vets\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Doctor\\\",\\\"specialties\\\":[{\\\"name\\\":\\\"Mock Surgery\\\"}]}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[3/4] Create Owner API Mock rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-owners-mock\",\"name\":\"PetClinic-Owner API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"startsWith\",\"value\":\"/owners\"}],\"responses\":[{\"name\":\"Mock Owner Response\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"content\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Owner\\\",\\\"city\\\":\\\"Mock City\\\",\\\"telephone\\\":\\\"1234567890\\\"}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[4/4] Verify PetClinic app health..."
        curl -sf http://petclinic:8080/vets && echo "  OK" || echo "  FAILED"
        echo ""

        echo "============================================"
        echo "  PetClinic enterprise test init complete"
        echo "============================================"
        echo ""
        echo "  Baafoo Server:  http://localhost:18084"
        echo "  PetClinic:      http://localhost:19966/vets"
        echo "  API Key:        enterprise-admin-key"
        echo ""
        echo "  Test API:"
        echo "    GET /vets - vet list (JSON)"
        echo "    GET /owners - owner list (HTML)"
        echo "============================================"
      '
