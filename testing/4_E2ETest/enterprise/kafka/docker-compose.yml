# =============================================================================
# Baafoo Enterprise Test - Apache Kafka
# Verifies Agent intercepts Kafka Producer/Consumer traffic with Baafoo Server
#
# Usage:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Kafka Broker - real Kafka for passthrough/record mode tests
  # =========================================================================
  kafka:
    # Apache official Kafka image (KRaft mode). Previously used soldevelo/kafka
    # (bitnami fork) but it generated a new random cluster ID on every restart,
    # causing infinite restart loops. apache/kafka uses a stable CLUSTER_ID env var.
    image: apache/kafka:latest
    container_name: baafoo-enterprise-kafka
    networks:
      - baafoo-enterprise-net
    ports:
      - "19092:9092"
      - "19093:9093"
    environment:
      # apache/kafka uses KAFKA_* env vars (not bitnami's KAFKA_CFG_* prefix)
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # Stable cluster ID - prevents random ID regeneration on restart
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      # apache/kafka doesn't put kafka-topics.sh on PATH for CMD-SHELL - use absolute path
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  # =========================================================================
  # Kafka Test App - baafoo-test-spring with Kafka Producer/Consumer endpoints
  # =========================================================================
  kafka-test-app:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/kafka/Dockerfile.kafka-test-app
    container_name: baafoo-enterprise-kafka-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18090:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-kafka
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Init container - create environment and register mock rules
  # =========================================================================
  kafka-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-kafka-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      kafka-test-app:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  Kafka enterprise test init"
        echo "============================================"
        echo ""

        echo "[1/5] Create environment enterprise-kafka..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-kafka\",\"mode\":\"stub\",\"description\":\"Kafka enterprise test environment\"}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[2/5] Create Kafka Topic exact match rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-exact\",\"name\":\"Kafka Topic Exact Match\",\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"equals\",\"value\":\"enterprise-test-topic\"}],\"responses\":[{\"name\":\"Mock Response\",\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-enterprise-kafka\\\",\\\"timestamp\\\":\\\"{{now}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[3/5] Create Kafka Topic wildcard match rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"kafka-enterprise-topic-wildcard\",\"name\":\"Kafka Topic Wildcard Match\",\"protocol\":\"kafka\",\"host\":\"kafka\",\"port\":9092,\"conditions\":[{\"type\":\"topic\",\"operator\":\"startsWith\",\"value\":\"enterprise-\"}],\"responses\":[{\"name\":\"Mock Wildcard Response\",\"body\":\"{\\\"mocked\\\":true,\\\"wildcard\\\":true,\\\"topic\\\":\\\"{{topic}}\\\"}\",\"delayMs\":0}],\"enabled\":true,\"priority\":50,\"tags\":[\"enterprise\",\"kafka\"],\"environments\":[\"enterprise-kafka\"]}" && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[4/5] Verify Kafka test app health..."
        curl -sf http://kafka-test-app:9090/api/stub-demo/health && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[5/5] Done."
        echo ""

        echo "============================================"
        echo "  Kafka enterprise test init complete"
        echo "============================================"
        echo ""
        echo "  Baafoo Server:  http://localhost:18084"
        echo "  Test App:       http://localhost:18090"
        echo "  Kafka:          localhost:19092 (host)"
        echo "                  kafka:9092 (internal)"
        echo "  API Key:        enterprise-admin-key"
        echo ""
        echo "  Test endpoints:"
        echo "    POST /api/stub-demo/kafka/send - send Kafka message"
        echo "    POST /api/stub-demo/kafka/consume - consume Kafka message"
        echo "============================================"
      '
