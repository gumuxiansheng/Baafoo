# =============================================================================
# Baafoo 浼佷笟绾у簲鐢ㄦ祴璇?- Spring Boot PetClinic
# 楠岃瘉 Agent 鍦ㄧ粡鍏?Spring Boot 浼佷笟搴旂敤涓殑鍏煎鎬?
#
# 鐢ㄦ硶:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # PetClinic 搴旂敤锛堟寕杞?Baafoo Agent锛?
  # 鍩虹闀滃儚浣跨敤 Java 17锛屽簲鐢ㄧ鍙?8080锛屽簲鐢ㄨ矾寰?/api/vets 绛?
  # =========================================================================
  petclinic:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/petclinic/Dockerfile.petclinic
    container_name: baafoo-enterprise-petclinic
    networks:
      - baafoo-enterprise-net
    ports:
      - "19966:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-petclinic
      - SERVER_PORT=8080
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms256m -Xmx512m
      - SPRING_PROFILES_ACTIVE=h2
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/vets || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # =========================================================================
  # 娴嬭瘯鍒濆鍖栧鍣?- 鍒涘缓娴嬭瘯鐜鍜岃鍒?
  # =========================================================================
  petclinic-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-petclinic-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      petclinic:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  PetClinic 浼佷笟绾ф祴璇曠幆澧冨垵濮嬪寲"
        echo "============================================"
        echo ""

        echo "[1/4] 鍒涘缓 enterprise-petclinic 鐜..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-petclinic\",\"mode\":\"stub\",\"description\":\"PetClinic浼佷笟绾ф祴璇曠幆澧僜"}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[2/4] 鍒涘缓 Vet API Mock 瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-vets-mock\",\"name\":\"PetClinic-Vet API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"equals\",\"value\":\"/vets\"}],\"responses\":[{\"name\":\"Mock鍏藉尰鍒楄〃\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"vets\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Doctor\\\",\\\"specialties\\\":[{\\\"name\\\":\\\"Mock Surgery\\\"}]}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[3/4] 鍒涘缓 Owner API Mock 瑙勫垯..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-owners-mock\",\"name\":\"PetClinic-Owner API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"startsWith\",\"value\":\"/owners\"}],\"responses\":[{\"name\":\"Mock涓氫富鍒楄〃\",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"content\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Owner\\\",\\\"city\\\":\\\"Mock City\\\",\\\"telephone\\\":\\\"1234567890\\\"}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  宸插瓨鍦?
        echo ""

        echo "[4/4] 楠岃瘉 PetClinic 搴旂敤鍋ュ悍鐘舵€?.."
        curl -sf http://petclinic:8080/vets && echo "  OK" || echo "  涓嶅彲杈?
        echo ""

        echo "============================================"
        echo "  PetClinic 浼佷笟绾ф祴璇曠幆澧冨氨缁?
        echo "============================================"
        echo ""
        echo "  Baafoo鎺у埗鍙? http://localhost:18084"
        echo "  PetClinic:    http://localhost:19966/vets"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  娴嬭瘯API:"
        echo "    GET /vets - 鍏藉尰鍒楄〃(JSON)"
        echo "    GET /owners - 涓氫富鍒楄〃(HTML)"
        echo "    GET /vets.html - 鍏藉尰HTML椤甸潰"
        echo "============================================"
      '
