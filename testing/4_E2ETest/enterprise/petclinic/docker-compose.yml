# =============================================================================
# Baafoo 娴间椒绗熺痪褍绨查悽銊︾ゴ鐠?- Spring Boot PetClinic
# 妤犲矁鐦?Agent 閸︺劎绮￠崗?Spring Boot 娴间椒绗熸惔鏃傛暏娑擃厾娈戦崗鐓庮啇閹?
#
# 閻劍纭?
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # PetClinic 鎼存梻鏁ら敍鍫熷瘯鏉?Baafoo Agent閿?
  # 閸╄櫣顢呴梹婊冨剼娴ｈ法鏁?Java 17閿涘苯绨查悽銊ь伂閸?8080閿涘苯绨查悽銊ㄧ熅瀵?/api/vets 缁?
  # =========================================================================
  petclinic:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/petclinic/Dockerfile.petclinic
    container_name: baafoo-enterprise-petclinic
    networks:
      - baafoo-enterprise-net
    ports:
      - "19966:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-petclinic
      - SERVER_PORT=8080
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms256m -Xmx512m
      - SPRING_PROFILES_ACTIVE=h2
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/vets 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # =========================================================================
  # 濞村鐦崚婵嗩潗閸栨牕顔愰崳?- 閸掓稑缂撳ù瀣槸閻滎垰顣ㄩ崪宀冾潐閸?
  # =========================================================================
  petclinic-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-petclinic-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      petclinic:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "============================================"
        echo "  PetClinic 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫鍨垫慨瀣"
        echo "============================================"
        echo ""

        echo "[1/4] 閸掓稑缂?enterprise-petclinic 閻滎垰顣?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"name\":\"enterprise-petclinic\",\"mode\":\"stub\",\"description\":\"PetClinic娴间椒绗熺痪褎绁寸拠鏇犲箚婢у儨"}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[2/4] 閸掓稑缂?Vet API Mock 鐟欏嫬鍨?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-vets-mock\",\"name\":\"PetClinic-Vet API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"equals\",\"value\":\"/vets\"}],\"responses\":[{\"name\":\"Mock閸忚棄灏伴崚妤勩€僜",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"vets\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Doctor\\\",\\\"specialties\\\":[{\\\"name\\\":\\\"Mock Surgery\\\"}]}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[3/4] 閸掓稑缂?Owner API Mock 鐟欏嫬鍨?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d "{\"id\":\"petclinic-owners-mock\",\"name\":\"PetClinic-Owner API Mock\",\"protocol\":\"http\",\"host\":\"petclinic\",\"port\":8080,\"conditions\":[{\"type\":\"path\",\"operator\":\"startsWith\",\"value\":\"/owners\"}],\"responses\":[{\"name\":\"Mock娑撴矮瀵岄崚妤勩€僜",\"statusCode\":200,\"body\":\"{\\\"mocked\\\":true,\\\"source\\\":\\\"baafoo-petclinic\\\",\\\"content\\\":[{\\\"id\\\":1,\\\"firstName\\\":\\\"Mock\\\",\\\"lastName\\\":\\\"Owner\\\",\\\"city\\\":\\\"Mock City\\\",\\\"telephone\\\":\\\"1234567890\\\"}]}\",\"delayMs\":0}],\"enabled\":true,\"priority\":100,\"tags\":[\"enterprise\",\"petclinic\"],\"environments\":[\"enterprise-petclinic\"]}" && echo "  OK" || echo "  瀹告彃鐡ㄩ崷?
        echo ""

        echo "[4/4] 妤犲矁鐦?PetClinic 鎼存梻鏁ら崑銉ユ倣閻樿埖鈧?.."
        curl -sf http://petclinic:8080/vets && echo "  OK" || echo "  娑撳秴褰叉潏?
        echo ""

        echo "============================================"
        echo "  PetClinic 娴间椒绗熺痪褎绁寸拠鏇犲箚婢у啫姘ㄧ紒?
        echo "============================================"
        echo ""
        echo "  Baafoo閹貉冨煑閸? http://localhost:18084"
        echo "  PetClinic:    http://localhost:19966/vets"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  濞村鐦疉PI:"
        echo "    GET /vets - 閸忚棄灏伴崚妤勩€?JSON)"
        echo "    GET /owners - 娑撴矮瀵岄崚妤勩€?HTML)"
        echo "    GET /vets.html - 閸忚棄灏癏TML妞ょ敻娼?
        echo "============================================"
      '
