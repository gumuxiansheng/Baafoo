# =============================================================================
# Spring Cloud Alibaba 多 Agent 共存测试 - Docker Compose Override
# 在原 docker-compose.yml 基础上追加 SkyWalking OAP + UI 服务
# 使用方式:
#   docker compose -f ../common/docker-compose.base.yml \
#                  -f docker-compose.yml \
#                  -f docker-compose.multi-agent.yml up -d --build
# =============================================================================

services:
  # ====================================================================
  # SkyWalking OAP (Observability Analysis Platform) 后端
  # 接收 Agent 上报的 trace/metric 数据
  # 使用 H2 存储模式（默认），避免额外下载 Elasticsearch
  # ====================================================================
  baafoo-enterprise-oap:
    image: apache/skywalking-oap-server:9.4.0-java17
    container_name: baafoo-enterprise-oap
    networks:
      - baafoo-enterprise-net
    ports:
      - "11800:11800"   # gRPC port (agent → OAP)
      - "12800:12800"   # HTTP port (UI → OAP)
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m
      - SW_STORAGE=h2
      - SW_HEALTH_CHECKER=default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:12800/internal/l7check || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  # ====================================================================
  # SkyWalking UI (optional - skipped due to Docker Hub network issues;
  # trace verification via OAP GraphQL HTTP API on port 12800 instead)
  # To enable: docker pull apache/skywalking-ui:9.4.0-java17 && uncomment
  # ====================================================================
  # baafoo-enterprise-ui:
  #   image: apache/skywalking-ui:9.4.0-java17
  #   container_name: baafoo-enterprise-ui
  #   networks:
  #     - baafoo-enterprise-net
  #   ports:
  #     - "18080:8080"
  #   environment:
  #     - SW_OAP_ADDRESS=http://baafoo-enterprise-oap:12800
  #   depends_on:
  #     baafoo-enterprise-oap:
  #       condition: service_healthy
  #   restart: unless-stopped

  # ====================================================================
  # Provider (multi-agent build)
  # Override the dockerfile to use multi-agent version
  # ====================================================================
  provider:
    build:
      dockerfile: testing/enterprise/spring-cloud-alibaba/Dockerfile.provider.multi-agent
    image: baafoo-sca-provider:multi-agent
    environment:
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m

  # ====================================================================
  # Consumer (multi-agent build)
  # Override the dockerfile to use multi-agent version
  # ====================================================================
  consumer:
    build:
      dockerfile: testing/enterprise/spring-cloud-alibaba/Dockerfile.consumer.multi-agent
    image: baafoo-sca-consumer:multi-agent
    environment:
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dnetworkaddress.cache.ttl=5
    depends_on:
      baafoo-enterprise-oap:
        condition: service_healthy
