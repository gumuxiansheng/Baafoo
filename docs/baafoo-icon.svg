<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="sheepGrad" x1="30" y1="20" x2="150" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="40" y1="30" x2="90" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="hornGrad2" x1="140" y1="30" x2="90" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="90" cy="90" r="88" fill="url(#bgGrad)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Sheep head -->
  <ellipse cx="90" cy="85" rx="32" ry="38" fill="#0f172a" stroke="url(#sheepGrad)" stroke-width="2"/>

  <!-- Left horn -->
  <path d="M65 65 Q55 35 45 30 Q55 32 70 58" fill="url(#hornGrad)" opacity="0.9"/>
  <!-- Right horn -->
  <path d="M115 65 Q125 35 135 30 Q125 32 110 58" fill="url(#hornGrad2)" opacity="0.9"/>

  <!-- Left ear -->
  <path d="M58 75 Q42 68 35 72 Q44 76 58 82" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Right ear -->
  <path d="M122 75 Q138 68 145 72 Q136 76 122 82" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="78" cy="80" r="4" fill="#06b6d4" opacity="0.9"/>
  <circle cx="102" cy="80" r="4" fill="#06b6d4" opacity="0.9"/>
  <!-- Eye highlights -->
  <circle cx="79" cy="79" r="1.5" fill="#e2e8f0"/>
  <circle cx="103" cy="79" r="1.5" fill="#e2e8f0"/>

  <!-- Snout -->
  <ellipse cx="90" cy="95" rx="8" ry="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="87" cy="94" r="1.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="93" cy="94" r="1.5" fill="#06b6d4" opacity="0.5"/>

  <!-- Mouth -->
  <path d="M86 99 Q90 102 94 99" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3" fill="none"/>

  <!-- Route intercept arrow -->
  <path d="M75 130 L90 145 L105 130" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="90" y1="145" x2="90" y2="165" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="90" cy="165" r="2" fill="#f59e0b"/>

  <!-- Decorative network dots -->
  <circle cx="30" cy="50" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="150" cy="50" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="25" cy="130" r="1.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="155" cy="130" r="1.5" fill="#06b6d4" opacity="0.3"/>
</svg>