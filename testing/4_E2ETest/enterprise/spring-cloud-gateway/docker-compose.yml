# =============================================================================
# Baafoo 濞撮棿妞掔粭鐔虹棯瑜嶇花鏌ユ偨閵婏妇銈撮悹?- Spring Cloud Gateway
# 濡ょ姴鐭侀惁?Agent 闁革负鍔庣紞澶愬礂閸愯尙婀撮柟鍑ら檮閸╁懘濡存担鐣岀畺婵犲鍊曞▍鎺楁煣閹冩倯閻庣懓绠嶉埀顑挎祰閻箖鎮芥潏顐ｇギ闁告瑦鍨靛┃鈧柡鍜佸灟缁楀懘鎯冮崟顔煎幋闁?#
# 闁活潿鍔嶇涵?
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # 闁告艾娴烽顒勫嫉瀹ュ懎顫ら柨娑樼墣閻箖鎮芥潏鈺傜獥闁哄秴娴勭槐婵囧緞瀹ュ洦鏆?baafoo-test-spring闁?  # =========================================================================
  backend-service:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.backend
    container_name: baafoo-enterprise-gateway-backend
    networks:
      - baafoo-enterprise-net
    ports:
      - "18092:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway-backend
      - SERVER_PORT=9090
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      baafoo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Spring Cloud Gateway闁挎稑鐗婄€垫洘娼?Baafoo Agent闁?  # 濞达綀娉曢弫銈団偓瑙勆戦弻?spring-cloud-gateway 闂傗偓濠婂啫鍓奸柨娑樼焸閳ь剚淇虹换鍐偝椤栨凹鏆旈柛娆愶耿閸ｆ椽鏌婂鍥╂瀭閻犱警鍨抽弫?  # =========================================================================
  gateway:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/spring-cloud-gateway/Dockerfile.gateway
    container_name: baafoo-enterprise-gateway
    networks:
      - baafoo-enterprise-net
    ports:
      - "18080:8080"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-gateway
      - JAVA_OPTS=-XX:-UseContainerSupport -Xms128m -Xmx256m
      - BACKEND_HOST=backend-service
      - BACKEND_PORT=9090
    depends_on:
      baafoo-server:
        condition: service_healthy
      backend-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # 婵炴潙顑堥惁顖炲礆濠靛棭娼楅柛鏍ㄧ墪椤旀劙宕?- 闁告帗绋戠紓鎾趁圭€ｎ厾妲搁柣婊庡灠椤ｃ劑宕畝鍐炬綈闁?  # =========================================================================
  gateway-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-gateway-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      gateway:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Spring Cloud Gateway 濞撮棿妞掔粭鐔虹棯瑜庣粊瀵告嫚閺囩姴绠氬褍鍟崹鍨叏鐎ｎ亜顕?
        echo "============================================"
        echo ""

        echo "[1/5] 闁告帗绋戠紓?enterprise-gateway 闁绘粠鍨伴。?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway","mode":"stub","description":"Gateway濞撮棿妞掔粭鐔虹棯瑜庣粊瀵告嫚閺囩姴绠氬?}' && echo "  OK" || echo "  鐎瑰憡褰冮悺銊╁捶?
        echo ""

        echo "[2/5] 闁告帗绋戠紓?enterprise-gateway-backend 闁绘粠鍨伴。?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-gateway-backend","mode":"stub","description":"Gateway闁告艾娴烽顒€霉鐎ｎ厾妲搁柣婊庡灠椤?}' && echo "  OK" || echo "  鐎瑰憡褰冮悺銊╁捶?
        echo ""

        echo "[3/5] 闁告帗绋戠紓?Gateway 閻犱警鍨抽弫?Mock 閻熸瑥瀚崹顖炴晬閸喎顏￠柟?/api/mock/** 閻犱警鍨扮欢鐐烘晬?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"gateway-route-mock","name":"Gateway閻犱警鍨抽弫鐩ck","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/mock/"}],"responses":[{"name":"Mock缂傚啯鍨甸崣褔宕鍛畨","statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-gateway\",\"path\":\"{{path}}\",\"timestamp\":\"{{now}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","route"],"environments":["enterprise-gateway"]}' && echo "  OK" || echo "  鐎瑰憡褰冮悺銊╁捶?
        echo ""

        echo "[4/5] 闁告帗绋戠紓鎾诲触鎼达綆浼?API Mock 閻熸瑥瀚崹顖炴晬閸喎顏￠柟鎼簻閹绮?/api/http/** 閻犱警鍨扮欢鐐烘晬?.."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"backend-api-mock","name":"闁告艾娴烽鐝筆I Mock","protocol":"http","host":"backend-service","port":9090,"conditions":[{"type":"path","operator":"startsWith","value":"/api/http/"}],"responses":[{"name":"Mock闁告艾娴烽顒勫传瀹ュ懐瀹?,"statusCode":200,"body":"{\"mocked\":true,\"source\":\"baafoo-backend\",\"method\":\"{{method}}\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","gateway","backend"],"environments":["enterprise-gateway-backend"]}' && echo "  OK" || echo "  鐎瑰憡褰冮悺銊╁捶?
        echo ""

        echo "[5/5] 濡ょ姴鐭侀惁?Gateway 闁稿鍎遍幃?.."
        curl -sf http://gateway:8080/actuator/health && echo "  OK" || echo "  濞戞挸绉磋ぐ鍙夋綇?
        echo ""

        echo "============================================"
        echo "  Spring Cloud Gateway 濞撮棿妞掔粭鐔虹棯瑜庣粊瀵告嫚閺囩姴绠氬褍鍟銊х磼?
        echo "============================================"
        echo ""
        echo "  Baafoo闁硅矇鍐ㄧ厬闁? http://localhost:18084"
        echo "  Gateway:      http://localhost:18080"
        echo "  闁告艾娴烽顒勫嫉瀹ュ懎顫?     http://localhost:18092"
        echo "  API Key:      enterprise-admin-key"
        echo ""
        echo "  婵炴潙顑堥惁顖滄崉椤栨粍鏆?"
        echo "    GET  /api/http/health          -> 闂侇偄绻嬬槐鍫曞礆閺夋寧鍊电紒?
        echo "    GET  /api/http/get?url=...     -> 闂侇偄绻嬬槐鍫曞礆閺夋寧鍊电紒?HTTP 閻犲鍟伴弫?
        echo "    GET  /api/mock/test            -> 閻?Gateway Agent Mock"
        echo "    GET  /api/backend/test         -> 闂侇偄绻嬬槐鍫曞礆閺夋寧鍊电紒鏃戝灠閹鎮?Mock"
        echo "============================================"
