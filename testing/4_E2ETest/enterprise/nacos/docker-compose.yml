# =============================================================================
# Baafoo Enterprise Test - Nacos Discovery & Config
# Verifies Agent intercepts Nacos service discovery and config API calls
#
# Usage:
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml up --build
#   docker compose -f ../common/docker-compose.base.yml -f docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Nacos Server - real Nacos for passthrough/record mode tests
  # =========================================================================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: baafoo-enterprise-nacos-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18848:8848"
      - "19848:9848"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - JVM_MS=32m
      - JVM_MMS=64m
      - JAVA_OPT=-XX:-UseContainerSupport
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # =========================================================================
  # Nacos Test App - baafoo-test-spring with HTTP proxy endpoints
  # =========================================================================
  nacos-test-app:
    build:
      context: ../../../..
      dockerfile: testing/4_E2ETest/enterprise/nacos/Dockerfile.nacos-test-app
    container_name: baafoo-enterprise-nacos-test-app
    networks:
      - baafoo-enterprise-net
    ports:
      - "18091:9090"
    environment:
      - BAAFOO_SERVER_HOST=baafoo-server
      - BAAFOO_ENV=enterprise-nacos
      - SERVER_PORT=9090
      - NACOS_ADDR=nacos:8848
      - JAVA_OPTS=-Xms128m -Xmx256m -Dhttp.keepAlive=false
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/api/stub-demo/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Init container - create environment and register mock rules
  # =========================================================================
  nacos-test-init:
    image: curlimages/curl:latest
    container_name: baafoo-enterprise-nacos-init
    networks:
      - baafoo-enterprise-net
    depends_on:
      baafoo-server:
        condition: service_healthy
      nacos-test-app:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "============================================"
        echo "  Nacos enterprise test init"
        echo "============================================"
        echo ""

        echo "[1/4] Create environment enterprise-nacos..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/environments \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"name":"enterprise-nacos","mode":"stub","description":"Nacos enterprise test environment"}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[2/4] Create Nacos Instance API Mock rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-register-mock","name":"Nacos Instance API Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance"}],"responses":[{"name":"Mock Instance Response","statusCode":200,"body":"{\"ok\":true,\"mocked\":true,\"source\":\"baafoo-nacos\"}","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","register"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[3/4] Create Nacos Discovery API Mock rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-discovery-mock","name":"Nacos Discovery Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/ns/instance/list"}],"responses":[{"name":"Mock Discovery Response","statusCode":200,"body":"{\"name\":\"mock-service\",\"hosts\":[{\"instanceId\":\"mock-1\",\"ip\":\"192.168.1.100\",\"port\":8080,\"healthy\":true,\"enabled\":true}],\"mocked\":true}","delayMs":0}],"enabled":true,"priority":50,"tags":["enterprise","nacos","discovery"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "[4/4] Create Nacos Config API Mock rule..."
        curl -sf -X POST http://baafoo-server:8084/__baafoo__/api/rules \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: enterprise-admin-key" \
          -d '{"id":"nacos-config-mock","name":"Nacos Config Mock","protocol":"http","host":"nacos","port":8848,"conditions":[{"type":"path","operator":"startsWith","value":"/nacos/v1/cs/configs"}],"responses":[{"name":"Mock Config Response","statusCode":200,"body":"server.port=9999\nmock.config=true\nsource=baafoo-nacos","delayMs":0}],"enabled":true,"priority":100,"tags":["enterprise","nacos","config"],"environments":["enterprise-nacos"]}' && echo "  OK" || echo "  FAILED"
        echo ""

        echo "============================================"
        echo "  Nacos enterprise test init complete"
        echo "============================================"
        echo ""
        echo "  Baafoo Server:  http://localhost:18084"
        echo "  Test App:       http://localhost:18091"
        echo "  Nacos Server:   http://localhost:18848/nacos"
        echo "  API Key:        enterprise-admin-key"
        echo ""
        echo "  Test endpoints:"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/ns/instance/list?serviceName=test"
        echo "    GET  /api/http/get?url=http://nacos:8848/nacos/v1/cs/configs?dataId=test&group=DEFAULT"
        echo "    POST /api/http/post?url=http://nacos:8848/nacos/v1/ns/instance?serviceName=test&ip=10.0.0.1&port=8080"
        echo "============================================"
